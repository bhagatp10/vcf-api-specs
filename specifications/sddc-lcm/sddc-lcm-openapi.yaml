openapi: 3.0.4
info:
  title: VCF SDDC LCM Service APIs
  version: 9.1.0.0
servers:
- description: VCF SDDC LCM Service
  url: https://vcf.broadcom.com/sddc-lcm
security:
- bearerToken: []
tags:
- description: SDDC LCM Health APIs.
  name: Health
- description: SDDC LCM Configuration APIs.
  name: Config
- description: SDDC LCM Depot-related APIs
  name: Depot
- description: "Component installation, import or deployment reconfiguration APIs.\
    \ These APIs are subject to change in future VCF releases. Appropriate details\
    \ around such changes will be provided."
  name: Components
- description: "Component support bundle generation, download and deletion APIs."
  name: SupportBundles
- description: Standalone node installation and reconfiguration APIs.
  name: Nodes
- description: API to Patch or Upgrade component. These APIs are subject to change
    in future VCF releases. Appropriate details around such changes will be provided.
  name: Upgrade
paths:
  /v1/health:
    get:
      description: Get the SDDC LCM health status.
      operationId: getHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      security: []
      tags:
      - Health
  /v1/config:
    get:
      description: "Fetch the SDDC LCM configuration, including registered components\
        \ and the associated fleet, if any."
      operationId: getConfig
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Config
    post:
      description: Configure SDDC LCM by connecting it to SDDC Manager and Fleet LCM.
      operationId: setConfig
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Config
  /v1/depot:
    post:
      description: Register Fleet Depot as a depot to components known to this SDDC
        LCM instance
      operationId: setDepot
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FleetDepotSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Depot
  /v1/depot/components:
    post:
      description: Resolve component versions to binary urls given a Fleet Depot endpoint
        and a list of components with their versions
      operationId: resolveDepotComponents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepotComponentsSpec'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedComponentVersions'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Depot
  /v1/components:
    get:
      description: Fetch the components registered with SDDC LCM.
      operationId: getComponents
      parameters:
      - description: Component scope to filter by.
        explode: true
        in: query
        name: scope
        required: false
        schema:
          enum:
          - FLEET
          - INSTANCE
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Components'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    post:
      description: Install new or import existing component(s).
      operationId: createComponents
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentSpecs'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/status:
    post:
      description: Fetches the status for the components with the input IDs.
      operationId: fetchComponentStatuses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentStatusesSpec'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentStatuses'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/{componentId}:
    get:
      description: Get a Component.
      operationId: getComponent
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Component'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    patch:
      description: Update component deployment (by adding more nodes to it).
      operationId: updateComponent
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentUpdateSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    post:
      description: Perform an action on a given component.
      operationId: performComponentAction
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Component action to perform.
        explode: true
        in: query
        name: action
        required: true
        schema:
          enum:
          - shutdown
          - restart
          - start
          - refresh
          - precheck
          - apply
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentUpgradeSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal Server Error
      tags:
      - Components
  /v1/components/backups:
    get:
      description: Get the backups for all components.
      operationId: getComponentsBackups
      parameters:
      - description: Component ID.
        explode: true
        in: query
        name: componentId
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - description: "The earliest date for which to list items, formatted as 2025-09-12T16:09:53Z."
        explode: true
        in: query
        name: periodStart
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "The latest date for which to list items, formatted as 2025-09-12T16:09:53Z."
        explode: true
        in: query
        name: periodEnd
        required: false
        schema:
          format: date-time
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentBackups'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    post:
      description: Initiate a backup or restore components task.
      operationId: backupRestoreComponentsAction
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupRestoreSpec'
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/{componentId}/config:
    get:
      description: Get a Component's config.
      operationId: getComponentConfig
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentConfig'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
    patch:
      description: Update a Component's config.
      operationId: updateComponentConfig
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentConfigUpdateSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/{componentId}/nodes:
    get:
      description: List a Component's nodes.
      operationId: getComponentNodes
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Page Number.
        explode: true
        in: query
        name: pageNumber
        required: false
        schema:
          type: integer
        style: form
      - description: Page Size. Maximum allowed is 50.
        explode: true
        in: query
        name: pageSize
        required: false
        schema:
          type: integer
        style: form
      - description: Comma-separated list of node types
        example: "control-plane,worker"
        explode: true
        in: query
        name: nodeTypes
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Nodes'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/{componentId}/status:
    get:
      description: Get a Component's status.
      operationId: getComponentStatus
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComponentStatus'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Components
  /v1/components/{componentId}/support-bundles:
    get:
      description: Fetch the list of generated support bundles for a given component.
      operationId: getComponentSupportBundles
      parameters:
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SupportBundle'
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SupportBundles
    post:
      description: Generates a support bundle for a given component.
      operationId: generateComponentSupportBundle
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComponentSupportBundleSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SupportBundles
  /v1/components/{componentId}/support-bundles/{supportBundleId}:
    delete:
      description: Delete a support bundle for a given component by its ID.
      operationId: deleteComponentSupportBundle
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      - description: Component Identifier.
        explode: true
        in: path
        name: componentId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Support Bundle Identifier.
        explode: true
        in: path
        name: supportBundleId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: The specified resource was not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - SupportBundles
  /v1/nodes:
    post:
      description: Install new standalone node.
      operationId: createNode
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OvaNodeSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bad request. Invalid input specification.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Nodes
  /v1/nodes/{nodeId}/config:
    patch:
      description: Update a node's config.
      operationId: updateNodeConfig
      parameters:
      - description: Correlation ID for tracing the request across services
        explode: true
        in: header
        name: X-Correlation-Id
        required: false
        schema:
          type: string
        style: simple
      - description: Standalone Node Identifier.
        explode: true
        in: path
        name: nodeId
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OvaNodeSizeConfigSpec'
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          description: Accepted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Internal server error
      tags:
      - Nodes
  /v1/tasks:
    get:
      description: Get all tasks
      operationId: getTasks
      parameters:
      - description: Filter tasks by status
        in: query
        name: status
        required: false
        schema:
          type: string
      - description: Filter tasks by type
        in: query
        name: type
        required: false
        schema:
          type: string
      - description: Filter tasks by creator (username or service account)
        in: query
        name: createdBy
        required: false
        schema:
          type: string
      - description: Filter tasks by name (internal name)
        in: query
        name: name
        required: false
        schema:
          type: string
      - description: Filter tasks by description (public name for the task)
        in: query
        name: description
        required: false
        schema:
          type: string
      - description: Filter tasks with start time greater than the specified timestamp
          (ISO 8601 format)
        in: query
        name: startTimeGt
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter tasks with start time less than the specified timestamp
          (ISO 8601 format)
        in: query
        name: startTimeLt
        required: false
        schema:
          format: date-time
          type: string
      - description: Filter tasks with update time greater than the specified timestamp
          (ISO 8601 format)
        in: query
        name: updateTimeGt
