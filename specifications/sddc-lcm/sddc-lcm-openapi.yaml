    ComponentDesiredSpec:
      description: |
        Specifications related to the component's desired configuration and the source for its upgrade artifacts.
      example:
        software:
          version: 9.1.0.0000.1234567
        depot:
          certificate:
          - LS0tLS1CRUdJTiBDRVJUSUZJQ0FUR...
          - MIIDMjCCAhegAwIBAgIQI...0tRU5EIENFUlRJRklDQVRF
          url: https://fds.vsphere.com/component-x/v9.1.0/upgrade-manifest
        userInput: "{}"
        additionalInput: "{}"
        policy: "{}"
      properties:
        software:
          $ref: '#/components/schemas/SoftwareSpec'
        policy:
          description: |
            Specific policies to apply during the component's upgrade lifecycle.
            This object allows for arbitrary key-value pairs specific to the component or operation.
          type: object
        depot:
          $ref: '#/components/schemas/DepotSpec'
        userInput:
          description: |
            User-input specific configuration required for component upgrade.
            This object allows for arbitrary key-value pairs specific to the component or operation.
          type: object
        additionalInput:
          description: |
            Additional inputs required for component upgrade.
            This object allows for arbitrary key-value pairs specific to the component or operation.
          type: object
      required:
      - depot
      - software
      type: object
    SoftwareSpec:
      description: The desired state specifications for the component post-upgrade.
      example:
        version: 9.1.0.0000.1234567
      properties:
        version:
          description: The exact target version to which the component should be upgraded.
          example: 9.1.0.0000.1234567
          type: string
      required:
      - version
      type: object
    PolicySpec:
      description: |
        Specific policies to apply during the component's upgrade lifecycle.
        This object allows for arbitrary key-value pairs specific to the component or operation.
      type: object
    DepotSpec:
      description: |
        Details for accessing the software depot where the component's upgrade manifest or package is located.
      example:
        certificate:
        - LS0tLS1CRUdJTiBDRVJUSUZJQ0FUR...
        - MIIDMjCCAhegAwIBAgIQI...0tRU5EIENFUlRJRklDQVRF
        url: https://fds.vsphere.com/component-x/v9.1.0/upgrade-manifest
      properties:
        url:
          description: |
            The URL pointing to the component's upgrade manifest, package, or the root of its upgrade repository in the depot.
          example: https://fds.vsphere.com/component-x/v9.1.0/upgrade-manifest
          format: uri
          type: string
        certificate:
          description: |
            A list of base64-encoded strings representing certificates (e.g., PEM format) required to authenticate with the depot.
          example:
          - LS0tLS1CRUdJTiBDRVJUSUZJQ0FUR...
          - MIIDMjCCAhegAwIBAgIQI...0tRU5EIENFUlRJRklDQVRF
          items:
            type: string
          type: array
      required:
      - url
      type: object
    UserInputSpec:
      description: |
        User-input specific configuration required for component upgrade.
        This object allows for arbitrary key-value pairs specific to the component or operation.
      type: object
    AdditionalInputSpec:
      description: |
        Additional inputs required for component upgrade.
        This object allows for arbitrary key-value pairs specific to the component or operation.
      type: object
    LcmPlatformSpec:
      description: |
        Lifecycle Management (LCM) specific options controlling the behavior of the upgrade process itself.
      example:
        performBackup: false
      properties:
        performBackup:
          default: false
          description: |
            If true, the system will attempt to create a backup of the component's current state before proceeding with the upgrade.
          example: false
          type: boolean
      required:
      - performBackup
      type: object
    Task_taskSummary:
      description: |
        Summary information about sub tasks.
        See sample-task-example.yaml for examples of how this summary is calculated.
      example:
        totalSteps: 6
        totalSubTasks: 0
      properties:
        totalSubTasks:
          description: Total number of sub tasks in this task
          type: integer
        totalSteps:
          description: Total number of steps across all sub tasks and this task
