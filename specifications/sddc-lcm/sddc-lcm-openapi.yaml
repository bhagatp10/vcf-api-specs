        port:
          description: "Internet proxy server port number, e.g. 3128"
          type: integer
        tlsEnabled:
          description: Enable TLS for Internet Proxy Server
          type: boolean
        credentialsEnabled:
          description: Enable credentials for Internet Proxy Server
          type: boolean
        username:
          description: Username to connect to Internet Proxy Server
          type: string
        password:
          description: Password to connect to Internet Proxy Server
          format: password
          type: string
        encodedCertificate:
          description: Base64 encoded Server certificate in PEM format for Internet
            Proxy Server
          type: string
        excludeDomains:
          description: Comma-separated list of Domains to exclude from Internet proxy
            server
          type: string
        excludeIpAddresses:
          description: Comma-separated list of IP Addresses to exclude from Internet
            proxy server
          type: string
      type: object
    VspVolumes:
      items:
        $ref: '#/components/schemas/VspVolume'
      type: array
    VspVolume:
      allOf:
      - $ref: '#/components/schemas/VspVolumeBase'
      - properties:
          name:
            description: the volume's name
            type: string
          used:
            description: consumed storage in bytes
            format: int64
            type: integer
          totalCapacity:
            description: the total capacity in bytes
            format: int64
            type: integer
          count:
            description: the number of volumes of the same type
            format: int64
            type: integer
          description:
            description: the volume's description
            type: string
        type: object
    VspVolumesSpec:
      items:
        $ref: '#/components/schemas/VspVolumeBase'
      type: array
    VspVolumeBase:
      properties:
        id:
          description: the volume's id
          type: string
        capacity:
          description: size in bytes. must be multiple of KiB when updating the volume
            capacity
          format: int64
          type: integer
      type: object
    ComponentCredentials:
      description: Credentials for a component.
      properties:
        username:
          type: string
        password:
          format: password
          type: string
      type: object
    ComponentStatuses:
      description: Component current statuses
      example:
        componentStatuses:
        - id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          status: Unknown
        - id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          status: Unknown
      properties:
        componentStatuses:
          items:
            $ref: '#/components/schemas/ComponentStatus'
          type: array
      type: object
    ComponentStatus:
      description: Component current status
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        status: Unknown
      properties:
        id:
          description: Component Identifier.
          format: uuid
          type: string
        status:
          description: The component status.
          enum:
          - Unknown
          - NotRunning
          - Running
          type: string
      type: object
    BackupConfigSpec:
      description: Backup configuration for a component/cluster.
      properties:
        encryptionPassphrase:
          description: Passphrase for encrypting the backups.
          type: string
        fullSchedule:
          $ref: '#/components/schemas/FullBackupConfigSpec'
        incrementalSchedule:
          $ref: '#/components/schemas/IncrementalBackupConfigSpec'
        retention:
          $ref: '#/components/schemas/BackupRetentionConfigSpec'
        storage:
          $ref: '#/components/schemas/BackupStorageConfigSpec'
      type: object
    FullBackupConfigSpec:
      description: Configuration for full backups.
      properties:
        enabled:
          description: Shows if the full backups are enabled.
          type: boolean
        schedule:
          $ref: '#/components/schemas/BackupScheduleSpec'
      type: object
    BackupScheduleSpec:
      description: Backup schedule configuration.
      properties:
        startTime:
          description: The time of the day when the backup should be created.
          format: time
          type: string
        days:
          description: The days on which a backup should be created. Pass all values
            for every day.
          example:
          - MON
          - TUE
          - WED
          - THU
          - FRI
          - SAT
          - SUN
          items:
            enum:
            - MON
            - TUE
            - WED
            - THU
            - FRI
            - SAT
            - SUN
            type: string
          type: array
      type: object
    IncrementalBackupConfigSpec:
      description: Configuration for incremental backups. Incremental backups require
        full backups to be enabled.
      properties:
        enabled:
          description: Shows if the incremental backups are enabled.
          type: boolean
        fallbackToFull:
          description: Shows whether to fallback to a full backup.
          type: boolean
        interval:
          default: 15
          description: Interval in minutes for an incremental backup to be created.
          minimum: 1
          type: integer
      type: object
    BackupRetentionConfigSpec:
      description: Retention configuration for backups. The properties are mutually
        exclusive.
      properties:
        maxBackups:
          description: Number of backups that would be kept.
          minimum: 1
          type: integer
        maxAgeBackups:
          description: Number of days for which a backup would be kept.
          minimum: 1
          type: integer
      type: object
    BackupStorageConfigSpec:
      description: Storage configurations for backups.
      properties:
        sftp:
          $ref: '#/components/schemas/SftpStorageConfigSpec'
      type: object
    SftpStorageConfigSpec:
      description: Configuration for SFTP storage.
      properties:
        host:
          description: The address of the SFTP server.
          type: string
        port:
          description: The port of the SFTP server.
          type: string
        thumbprint:
          description: The thumbprint of the SFTP server.
          type: string
        username:
          description: The username used for authentication with the SFTP server.
          type: string
        password:
          description: The password used for authentication with the SFTP server.
          format: password
          type: string
        directory:
          description: Directory on the SFTP server where the objects will be stored.
          type: string
      type: object
    ComponentSnapshotSpec:
      description: Create or revert Snapshot spec.
      discriminator:
        mapping:
          ComponentSnapshotCreateSpec: '#/components/schemas/ComponentSnapshotCreateSpec'
          ComponentSnapshotRevertSpec: '#/components/schemas/ComponentSnapshotRevertSpec'
        propertyName: actionType
      oneOf:
      - $ref: '#/components/schemas/ComponentSnapshotCreateSpec'
      - $ref: '#/components/schemas/ComponentSnapshotRevertSpec'
      type: object
    ComponentSnapshotCreateSpec:
      description: Spec for creation of a Snapshot of a Component.
      properties:
        actionType:
          type: string
        snapshotPrefix:
          description: User friendly prefix used for the Snapshot name.
          type: string
        snapshotDescription:
          description: User friendly description of the Snapshot.
          type: string
        shouldSnapshotWithMemory:
          description: Flag that indicates if the Snapshot has to be taken along with
            memory of the Component.
          type: boolean
        shouldShutdownBeforeSnapshot:
          description: Flag that indicates if the Component has to be gracefully shutdown
            before taking the Snapshot.
          type: boolean
      required:
      - actionType
      - snapshotPrefix
      type: object
    ComponentSnapshotRevertSpec:
      description: Spec for revert using a Snapshot of a Component.
      properties:
        actionType:
          type: string
        snapshotId:
          format: uuid
          type: string
      required:
      - actionType
      - snapshotId
      type: object
    ComponentSnapshot:
      description: Details of a Snapshot of a Component.
      properties:
        name:
          description: "Snapshot name, formatted as 2025-09-12T16-09-53Z along with\
            \ a prefix."
          type: string
        description:
          description: User friendly description of the Snapshot.
          type: string
        snapshotId:
          description: Snapshot ID.
          format: uuid
          type: string
        componentType:
          description: Component Type.
          type: string
        componentId:
          description: Component ID.
          format: uuid
          type: string
      type: object
    BackupRestoreSpec:
