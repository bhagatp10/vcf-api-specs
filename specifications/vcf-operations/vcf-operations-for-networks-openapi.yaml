          in: query
          description: Destination VM Entity ID
          required: true
          schema:
            type: string
        - name: resolution_in_minutes
          in: query
          description: Metric point interval. Supported values are 5 or 30 minutes.
          required: true
          schema:
            type: integer
        - name: end_time
          in: query
          description: End time for query in epoch milli seconds.
          required: true
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          description: limit for paged list response.
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Success
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
