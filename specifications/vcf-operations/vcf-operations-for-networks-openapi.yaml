    DatabusSubscriber:
      type: object
      properties:
        id:
          type: string
          description: unique id assigned for the receiver by VCF Operations for networks.
            This is not required while creating the subscription
          example: 9c488c91-692e-4992-a83f-ee33a0f9a6c6
        message_group:
          type: string
          description: |-
            Message-group name for receiving the data from.
            Message group of a subscription cannot be changed after creation.
            Supported message groups - application, flows, problems, metrics, vms, hosts, nics, switchports, vms-metrics, hosts-metrics, flows-metrics, nics-metrics, switchports-metrics
          example: problems
        url:
          type: string
          description: |-
            URL where the data will be posted to.
            All the messages from the message group will be posted to this url.
            If multiple receivers are present behind a load balancer, this can be the url of the load balancer.
            The url of the subscription can be changed after the creation of the subscription.
          example: https://data-pipeline.vmware.com/vrni/events
        filter_tags:
          type: array
          description: |-
            Filter tag is optional and used only for flows filtering.
            Please reach out to VMware support to enable filtering functionality in Databus.
          items:
            $ref: '#/components/schemas/DatabusFilterTag'
