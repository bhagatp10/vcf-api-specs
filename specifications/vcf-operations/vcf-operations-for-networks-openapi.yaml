  /data-sources/vcenters/validate:
    post:
      tags:
        - Data Sources
      summary: Validate a vCenter data source
      description: |-
        Validate a vCenter data source. You must provide one of IP or FQDN field in the request body.
        Appropriate proxy id is retrieved from /infra/nodes URL to select the proxy node.
      operationId: validateVCenter
      requestBody:
        description: vCenter Credentials
        content:
