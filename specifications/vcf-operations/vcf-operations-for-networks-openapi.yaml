        "404":
          $ref: '#/components/responses/NotFoundResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
      x-vmw-compiler-skip: FILE
  /flows/tcp-incomplete/list:
    get:
      tags:
        - Incomplete TCP flow Sessions
      summary: Get drill down of the incomplete tcp sessions for a specific destination
        virtual machine.
      description: Get drill down of the incomplete tcp sessions for a specific destination
        virtual machine in a specific time interval.
      operationId: listIncompleteSessions
      parameters:
        - name: destination_vm_entity_id
          in: query
          description: Destination VM Entity ID
          required: true
          schema:
            type: string
        - name: resolution_in_minutes
          in: query
          description: Metric point interval. Supported values are 5 or 30 minutes.
          required: true
          schema:
            type: integer
        - name: end_time
          in: query
          description: End time for query in epoch milli seconds.
          required: true
          schema:
            type: integer
            format: int64
        - name: start
          in: query
          description: start index for paged list response.
          required: true
          schema:
            type: integer
            format: int32
        - name: limit
          in: query
          description: limit for paged list response.
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncompleteSessionDrillDownListResponse'
              example:
                results:
                  - src_entity: VM-2
                    src_entity_id: 18230:1:123456
                    src_entity_type: VM
                    dst_Port: 443
                    firewall_rule: rule_default
                    firewall_rule_id: 18230:805:1533393386
                    incomplete_tcp_session_count: 5867
                  - src_entity: 10.1.243.12
                    src_entity_id: null
                    src_entity_type: IP
                    dst_Port: 657
                    firewall_rule: Default Rule NDP
                    firewall_rule_id: 18230:805:18873393386
                    incomplete_tcp_session_count: 4340
                total_count: 15
                start_time: 1509231996
                end_time: 1509318396
        "400":
          $ref: '#/components/responses/BadRequestResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'
        "403":
          $ref: '#/components/responses/ForbiddenResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
