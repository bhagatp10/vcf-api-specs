          properties:
            create_time:
              type: integer
              description: Timestamp of when the object was created
              format: int64
              example: 159724400600
            created_by:
              type: string
              description: The username of who created the object
              example: admin@local
            last_modified_time:
              type: integer
              description: Timestamp of when the object was last modified
              format: int64
              example: 159724400600
            last_modified_by:
              type: string
              description: The username of who last modified the object
              example: someone@else.com
            last_modified_by_service:
              type: string
              description: The service which last modified the application.
              example: Ensemble
            tier_count:
              type: integer
              description: The count of all the tiers of the application.
              format: int32
              example: 25
            member_count:
              type: integer
              description: The count of all the members of the application.
              format: int32
              example: 500
