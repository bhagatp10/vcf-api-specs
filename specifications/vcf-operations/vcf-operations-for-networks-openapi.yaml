        time_range:
          $ref: '#/components/schemas/TimeRange'
        size:
          type: integer
          format: int32
        cursor:
          type: string
      example:
        entity_type: Flow
        filter: destination_ip.ip_address = '1.1.1.1'
        aggregations:
          - field: flow.totalBytes.delta.summation.bytes
            aggregation_type: SUM
        time_range:
          start_time: 1534410000
          end_time: 1534410559
        group_by:
          - source_ip
          - destination_ip
        size: 2
        sort_by:
          - field: flow.totalBytes.delta.summation.bytes
            aggregation_type: SUM
            order: DESC
