                not counted
              format: int32
              example: 5
            numOfValidNAVLicense:
              type: integer
              description: Number of valid NAV licenses available. Active licenses
                from last major version which are only valid for grace period are
                not counted
              format: int32
              example: 2
            numOfValidAdvancedLicense:
              type: integer
              description: Number of valid Advanced licenses available. Active licenses
                from last major version which are only valid for grace period are
                not counted
              format: int32
              example: 5
            numOfValidROBOLicense:
              type: integer
              description: Number of valid ROBO licenses available. Active licenses
