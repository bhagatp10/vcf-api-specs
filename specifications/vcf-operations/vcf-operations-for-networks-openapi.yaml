        "404":
          $ref: '#/components/responses/NotFoundResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
    delete:
      tags:
        - Infrastructure
      summary: Delete proxy node
      description: |-
        The proxy id is required for deleting a proxy node which can either be NodeId or model key.
        Examples : 10000:901:649591578347200326 (id) or IAPG7M8JS18458ROSJQRGQ0LLV (node_id).
        Only the admin user can perform this operation. Only the proxy nodes can be deleted using this API.
      operationId: deleteNode
      parameters:
        - name: id
          in: path
          description: The Entity ID of object requestion information on
          required: true
          schema:
            type: string
