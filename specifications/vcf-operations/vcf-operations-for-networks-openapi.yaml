      nullable: true
      enum:
        - CPUs
        - VMs
        - Edges
        - Devices
        - IPs
        - vCPUs
        - Hosts
    LicenseUsageObject:
      type: string
      description: License usage objects
      nullable: true
      enum:
        - VMware vSphere
        - VMware Cloud on AWS
        - AWS
        - Azure
        - Physical IPs
        - SD-WAN
        - Networking Devices
    LicenseCapacityType:
      type: string
      description: License entitlement types
      nullable: true
      enum:
        - CPU
        - CCU
        - VM
        - CORE
        - TEN_MBPS
        - THIRTY_MBPS
        - FIFTY_MBPS
        - HUNDRED_MBPS
        - TWO_HUNDRED_MBPS
        - FIVE_HUNDRED_MBPS
        - ONE_GBPS
        - TWO_GBPS
        - FIVE_GBPS
        - TEN_GBPS
        - THREE_FIFTY_MBPS
        - SEVEN_FIFTY_MBPS
        - DEVICE
    LicenseEdition:
      type: string
      description: Types for License Editions
      nullable: true
      enum:
        - ADVANCED
        - ENTERPRISE
        - ROBO
        - SDWAN
        - NAV
        - UNIVERSAL
        - VRNIC_ENTERPRISE
        - VRNIC_NAV
        - VRNIC_UNIVERSAL
        - VRNIC_VPT
    LicenseUsage:
      type: array
      items:
        type: object
        properties:
          type:
            $ref: '#/components/schemas/LicenseUsageObject'
          unit:
            $ref: '#/components/schemas/LicenseUsageCapacity'
          count:
            type: integer
            description: Count for entitlement in use
            format: int32
            example: 132
          socketsUsed:
            type: integer
            description: Count for sockets in use
            format: int32
            example: 132
          coresUsed:
            type: integer
            description: Count for cores in use
            format: int32
            example: 1584
          edgesUsed:
            type: integer
            description: Count for edges in use
            format: int32
            example: 0
          devicesUsed:
            type: integer
            description: Count for edges in use
            format: int32
            example: 0
          query:
            type: string
            description: Search query used to calculate the usage
            example: Hosts where manager.SDDC Type = 'ONPREM' and model != 'VMware
              Mobility Platform' and Witness = False group by manager order by sum(CPU
              Sockets)
    VRNILicense:
      type: object
      properties:
        productName:
          type: string
          example: VCF Operations for networks
        evaluation:
          type: boolean
          description: true if license is evaluation license
        licenseKey:
          type: string
          description: license serial key
          example: AAAAA-BBBBB-CCCCC-DDDDD-EEEE
        numberOfSockets:
          type: integer
          description: sockets entitlement for this license
          format: int32
          example: 25
        expirationDate:
          type: integer
          description: unix epoch time
          format: int64
          example: 1661143082
        serviceTag:
          type: string
          description: service tag
          example: CPN0EgdEOFVWNzM0
        expired:
          type: boolean
          description: true if license is expired
        deploymentType:
          type: string
          description: environment deployment type
          example: onprem
        capacityType:
          $ref: '#/components/schemas/LicenseCapacityType'
        edition:
          $ref: '#/components/schemas/LicenseEdition'
        suspended:
          type: boolean
          description: true if customer state is suspended
        deleted:
          type: boolean
          description: true if customer state is deleted
        invalid:
          type: boolean
          description: "true for license keys from last version, which are active\
            \ only for grace period"
        managedByVrni:
          type: boolean
          description: true for license edition managed by vrni
        entitlements:
          type: array
          description: list of entitlements supported by the license
          items:
            $ref: '#/components/schemas/LicenseEntitlement'
        currentLicenses:
          $ref: '#/components/schemas/CurrentLicenses'
    VRNILicenseV2:
      type: object
      properties:
        customerId:
          type: integer
          description: customer id
          format: int32
        productName:
          type: string
          example: VCF Operations for networks
        licenseType:
          type: string
          description: license type (VCF_ENABLED/EVALUATION)
        expirationDate:
          type: integer
          description: unix epoch time
          format: int64
        serviceTag:
          type: string
          description: service tag
        expired:
          type: boolean
          description: true if license is expired
        inGracePeriod:
          type: boolean
          description: true if grace period is active
    CurrentLicenses:
      type: object
      properties:
        toRemove:
          type: array
          description: List of licenses that will be removed. This list will have
            Socket based licenses when Core based license is added.
          items:
            $ref: '#/components/schemas/VRNILicense'
        toRetain:
          type: array
          description: List of licenses that will be retained.
          items:
            $ref: '#/components/schemas/VRNILicense'
      description: This object returns licenses which will be removed and retained.
    LicenseEntitlement:
      type: object
      properties:
        capacityType:
          $ref: '#/components/schemas/LicenseCapacityType'
        count:
          type: integer
          description: capacity count for entitlement
          format: int32
      description: Entitlement supported by the license
    LicensingKeyRequest:
      type: object
      properties:
        licenseKey:
          type: string
      description: license request object
    LicensingActivate:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/VRNILicense'
    LicensingResponse:
      type: object
      properties:
        result:
          type: object
          properties:
            licenses:
              type: array
              items:
                $ref: '#/components/schemas/VRNILicense'
            licenseUsage:
              type: array
              items:
                $ref: '#/components/schemas/LicenseUsage'
            customerId:
              type: integer
              description: customer id
              format: int32
              example: 10000
            cpuCapacity:
              type: integer
              description: cpu capacity of current non-expired (valid licenses) and
                older (invalid) licenses (during grace period)
              format: int32
              example: 10
            ccuCapacity:
              type: integer
              description: ccu capacity of current non-expired (valid licenses) and
                older (invalid) licenses (during grace period)
              format: int32
              example: 10
            vmCapacity:
              type: integer
              description: VM capacity of current non-expired (valid licenses) and
                older (invalid) licenses (during grace period)
              format: int32
              example: 10
            coreCapacity:
              type: integer
              description: core capacity of current non-expired (valid licenses) and
                older (invalid) licenses (during grace period)
              format: int32
              example: 10
            edgeCapacity:
              type: integer
              description: edge capacity of current non-expired (valid licenses) and
                older (invalid) licenses (during grace period)
              format: int32
              example: 10
            serviceTag:
              type: string
              description: service tag
              example: CJBOEgdEQVMzWTFI
            expireDate:
              type: integer
              description: "Maximum of expiry date for current licenses, 0 if any\
                \ non-expiry license is present. Invalid/already expired license is\
                \ not considered here."
              format: int32
              example: 10
            enterprise:
              type: boolean
              description: true if non-expired ENTERPRISE license is available
            evaluation:
              type: boolean
              description: true if all licenses are evaluation license
            numOfEnterpriseLicense:
              type: integer
              description: number of total enterprise licenses available
              format: int32
              example: 10
            numOfValidLicense:
              type: integer
              description: Total Number of valid licenses available. Active licenses
                from last major version which are only valid for grace period are
                not counted
              format: int32
              example: 1
            numOfValidEnterpriseLicense:
              type: integer
              description: Number of valid Enterprise licenses available. Active licenses
                from last major version which are only valid for grace period are
                not counted
              format: int32
              example: 10
            numOfValidSDWANLicense:
