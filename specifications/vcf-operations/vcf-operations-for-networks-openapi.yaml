components:
  schemas:
    PagedTroubleshootingIncidentList:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/TroubleshootingIncident'
        total_count:
          type: integer
        cursor:
          type: string
          description: Cursor for the next page
          example: MTA=
    TroubleshootingIncident:
      type: object
      properties:
        entity_id:
          type: string
        start_entity_id:
          type: string
        name:
          type: string
        status:
          type: string
    UpdateTroubleshootingIncidentRequest:
      type: object
      properties:
        name:
          type: string
        start_time:
          type: integer
          format: int64
        end_time:
          type: integer
          format: int64
        status:
          type: string
    CreateTroubleshootingIncidentRequest:
      type: object
      properties:
        start_entity_id:
          type: string
        name:
          type: string
        start_time:
          type: integer
          format: int64
        end_time:
          type: integer
          format: int64
    TroubleshootingIncidentResponse:
      type: object
      properties:
        entity_id:
          type: string
        start_entity_id:
          type: string
        name:
          type: string
        status:
          type: string
        created_time:
          type: integer
          format: int64
        start_time:
          type: integer
          format: int64
        end_time:
          type: integer
          format: int64
        last_modified_time:
          type: integer
          format: int64
        created_by:
          type: string
        last_modified_by:
          type: string
    UserCredential:
      type: object
      properties:
        username:
          type: string
          example: admin@vrni.com
        password:
          type: string
          example: password
        domain:
          $ref: '#/components/schemas/Domain'
    Domain:
      type: object
      properties:
        domain_type:
          type: string
          description: "domain type, should be in uppercase"
          example: LDAP
          nullable: true
          enum:
            - LDAP
            - LOCAL
        value:
          type: string
          description: "domain value, not required for LOCAL domain"
          example: example.com
    Token:
      type: object
      properties:
        token:
          type: string
          example: Mgs2YX0ZSY+gHW6RYypeeA==
        expiry:
          type: integer
          description: expiry epoch time in secs.
          format: int64
          example: 1605201960327
    VidmToken:
      type: object
      properties:
        vidm_token:
          type: string
          description: User access token provided by VMware Identity Manager.
    VidmConfiguration:
      type: object
      properties:
        vidm_appliance:
          type: string
          description: Provide fully quallified domain name of VMware Identity Manager
          example: identity.domain.com
        rootCA_certificate:
          type: string
          description: Provide rootCA certificate to trust. Can be generated using
            /vidm/licence
          example: '-----BEGIN CERTIFICATE----- ..etc..'
        client_id:
          type: string
          description: Register VCF Operations for networks as an OAuth client to VMware
            Identity Manager and provide client-id
          example: VCF Operations for networks Client-ID
        client_secret:
          type: string
          description: Provide the registered OAuth client secret
          example: T2zRetc2f242KhelfoO6Qzw9
        sha_thumbprint:
          type: string
          description: "Optionally, provide SHA thumbprint to validate VMware Identity\
            \ Manager appliance that is being configured"
          example: 15:37:48:1E:DB:70:65:80:B2:74:E5:78:25:E5:AD:39:14:53:69:19
        enable:
          type: boolean
          description: "True, to enable the VMware Identity Manager integration in\
            \ VCF Operations for networks"
          example: true
    VidmCertificate:
      type: object
      properties:
        vidm_root_certificate:
          type: string
          description: Root certificate of the VIDM server
          example: '-----BEGIN CERTIFICATE----- ..etc..'
    VidmConfigResponse:
      type: object
      properties:
        vidm_appliance:
          type: string
          description: Fully quallified domain name of VMware Identity Manager
          example: identity.domain.com
        client_id:
          type: string
          description: Client-id of the configured OAuth client
          example: VCF Operations for networks Client-ID
        enable:
          type: boolean
          description: "True, if VMware Identity Manager integration is enabled"
          example: true
        certificate_validation_enabled:
          type: boolean
          description: "True, if SSL certificate check is enabled."
          example: false
          default: false
    VidmOauthClientResponse:
      type: object
      properties:
        vidm_appliance:
          type: string
          description: Fully quallified domain name of VMware Identity Manager configured
            in VCF Operations for networks
          example: identity.domain.com
        client_id:
          type: string
          description: Client-id of the password grant OAuth client
          example: VCF Operations for networks Client-ID
    UserType:
      type: string
      description: The type of user.
      example: VIDM
      nullable: true
      enum:
        - LDAP
        - LOCAL
        - VIDM
    UserGroupType:
      type: string
      description: The type of user-group.
      example: VIDM
      nullable: true
      enum:
        - LDAP
        - LOCAL
        - VIDM
    Role:
      type: string
      description: Role assigned the user/group.
      example: ADMIN
      nullable: true
      enum:
        - MEMBER
        - ADMIN
        - AUDITOR
    VidmUserRequest:
      type: object
      properties:
        username:
          type: string
          description: Provide username (domain should not be part of username).
          example: alleyMartin123
        domain:
          type: string
          description: Provide domain name to which user belongs to.
          example: vidmlabs.com
        display_name:
          type: string
          description: Provide user's display name (could be "givenName familyName")
          example: alley martin
        role:
          $ref: '#/components/schemas/Role'
      example:
        username: alleymartin123
        domain: vidmlabs.com
        display_name: alley martin
        role: ADMIN
    VCFWatermarkConfiguration:
      type: object
      properties:
        deployedby:
          type: string
          description: Deployment owner for VCF Operations for networks.
          example: VMware Cloud Foundation
        version:
          type: string
          description: Version of VMware Cloud Foundation(VCF).
          example: vcf-4.0
        managedby:
          type: string
          description: VMware Cloud Foundation (VCF) manager identifier to determine
            which instance manages the VRNI.
          example: <fqdn>
        instanceid:
          type: string
          description: VMware Cloud Foundation (VCF) instance id.
          example: <UUID>
        logtoken:
          type: string
          description: Logtoken for VMware Cloud Foundation (VCF).
          example: VCF
    UserResponse:
      type: object
      properties:
        user_type:
          $ref: '#/components/schemas/UserType'
        id:
          type: string
          description: Unique identifier assigned to user.
          example: alleymartin123@vidmlabs.com
        role:
          $ref: '#/components/schemas/Role'
        username:
          type: string
          description: Username of the user
          example: alleyMartin123
        domain:
          type: string
          description: Domain name to which group belongs to.
          example: vidmlabs.com
        display_name:
          type: string
          description: User's display name
          example: alley martin
      example:
        id: alleymartin123@vidmlabs.com
        user_type: VIDM
        username: alleymartin123
        domain: vidmlabs.com
        display_name: alley martin
        role: ADMIN
    UserRequest:
      type: object
      properties:
        userId:
          type: string
          description: Identifier of user
          example: svc-lcm-sddc-abc@local
        displayName:
          type: string
          description: Display name
          example: svc-lcm-sddc-abc@local
        password:
          type: string
          description: Password to authenticate
          example: Pass@1234
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    PagedUserListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        cursor:
          type: string
          example: MTA=
        total_count:
          type: integer
          example: 101
    VidmUserGroupRequest:
      type: object
      properties:
        group_name:
          type: string
          description: Specify group name (domain should not be part of group name).
          example: superAdmins
        domain:
          type: string
          description: Provide domain name to which user-group belongs to.
          example: vidmlabs.com
        role:
          $ref: '#/components/schemas/Role'
      example:
        group_name: testgroup
        domain: vidmlabs.com
        role: ADMIN
    UserGroupResponse:
      type: object
      properties:
        group_type:
          $ref: '#/components/schemas/UserGroupType'
        id:
          type: string
          description: Unique identifier assigned to user-group.
          example: testgroup@vidmlabs.com
        group_name:
          type: string
          description: Group-name of the user-group.
          example: vrniAdmins
        domain:
          type: string
          description: Domain name to which user-group belongs to.
          example: vidmlabs.com
        role:
          $ref: '#/components/schemas/Role'
      example:
        id: testgroup@vidmlabs.com
        group_type: VIDM
        group_name: testgroup
        domain: vidmlabs.com
        role: ADMIN
    PagedUserGroupListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/UserGroupResponse'
        cursor:
          type: string
          example: MTA=
        total_count:
          type: integer
          example: 1000
    FileServerType:
