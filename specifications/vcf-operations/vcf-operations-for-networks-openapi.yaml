  parameters:
    Identifier:
      name: id
      in: path
      description: The Entity ID of object requestion information on
      required: true
      schema:
        type: string
    IpIdentifier:
      name: ip-or-fqdn
      in: path
      description: The Ip Address of object
      required: true
      schema:
        type: string
    Time:
      name: time
      in: query
      description: Time in epoch seconds
      schema:
        type: integer
        format: int64
    Size:
      name: size
      in: query
      description: Page size of results
      schema:
        type: number
        default: 10
    Cursor:
      name: cursor
      in: query
      description: Cursor from previous response
      schema:
        type: string
    StartEntityId:
      name: start_entity_id
      in: query
      description: Start Entity ID
      schema:
        type: string
    StartTime:
      name: start_time
      in: query
      description: Start time for query in epoch seconds
      schema:
        type: number
    EndTime:
      name: end_time
      in: query
      description: End time for query in epoch seconds
      schema:
        type: number
    UserType:
      name: type
      in: query
      description: Type of user
      required: true
      schema:
        type: string
    UserGroupType:
      name: type
      in: query
      description: Type of user-group
      required: true
      schema:
        type: string
    EventTags:
      name: event_tags
      in: query
      description: Event tags
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    EventStatus:
      name: event_status
      in: query
      description: Status of event open or closed
      schema:
        type: string
        default: all
        nullable: true
        enum:
          - open
          - closed
          - all
    EventType:
      name: event_type
      in: query
      description: "Type of event, e.g UserDefinedProblemEvent"
      schema:
        type: string
    UpdateTimeFrom:
      name: update_time_from
      in: query
      description: "(Optional) Events that were created or updated or closed between\
        \ this time and update_time_to, in seconds"
      schema:
        type: number
    UpdateTimeTo:
      name: update_time_to
      in: query
      description: "(Optional) Events that were created or updated or closed between\
        \ update_time_from and this time, in seconds"
      schema:
        type: number
    EventSeverityList:
      name: event_severity
      in: query
      description: Event severity filter
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          nullable: true
          enum:
            - Critical
            - Warning
            - Moderate
            - Info
    EventManagers:
      name: managers
      in: query
      description: The entity ID of the manager of entity on which event is raised
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    PinIdentifier:
      name: pin-id
      in: path
      description: The ID of pin requesting information on
      required: true
      schema:
        type: string
    Filter:
      name: filter
      in: query
      description: A filter expression is a predicate expression (similar to SQL where
        clause) used to define the search criteria
      schema:
        type: string
    OrderBy:
      name: order_by
      in: query
      description: order by
      schema:
        type: string
    ShowCertificates:
      name: show_certficates
      in: query
      description: show certificates and thumbprint
      schema:
        type: boolean
        default: false
    DiscoveryTypeQueryParam:
      name: discovery_type
      in: query
      description: The discovery type of the application. Allowed values are SERVICE_NOW
        and FLOW_BASED_DISCOVERY.
      required: true
      schema:
        type: string
        default: SERVICE_NOW
    GranularityQueryParam:
      name: granularity
      in: query
      description: "The granularity of the discovered applications. Only applies to\
        \ flow based discovery. Allowed values are FINE, MEDIUM and COARSE."
      schema:
        type: string
    ApplianceTypeQueryParam:
      name: appliance_type
      in: query
      description: "Type of HCX Appliance, e.g HCXNEAPPLIANCE"
      schema:
        type: string
        nullable: true
        enum:
          - HCXIXAPPLIANCE
          - HCXNEAPPLIANCE
          - HCXWANOPTAPPLIANCE
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      description: "API Key - NetworkInsight {token}"
      name: Authorization
      in: header
    OpsTokenAuth:
      type: http
      scheme: bearer
      description: "VCF Ops JWT Token - Bearer {token}"
      bearerFormat: JWT
