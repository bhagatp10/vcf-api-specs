          type: integer
          description: "Full fetch flow interval in seconds. Range of allowed values\
            \ is number of seconds in one week to number of seconds in one month,\
            \ both values included."
          format: int64
          example: 604800
          default: 0
        pause_discovery:
          type: boolean
          description: True means pause the application and tier discovery and false
            means resume flow based application and tier discovery
          example: false
          default: false
        application_naming_preferences:
          type: array
          description: List of application naming preferences. The order should be
            the same as tier naming preferences. VM Names preference will be added
            to the end of the naming preferences if not present already.
          example:
            - type: LB_VIRTUAL_SERVERS
            - type: NSX_SECURITY_GROUPS
            - type: SECURITY_TAGS
            - type: VCENTER_TAGS
              values:
                - AppSystem
                - App Sys
                - App_ownership
            - type: VM_NAMES
              values:
                - ".*?_([^-_@. ]*)-([^-_@. ]*)-.*"
          items:
            $ref: '#/components/schemas/NamingPreference'
        tier_naming_preferences:
          type: array
          description: List of tier naming preferences. The order should be the same
            as application naming preferences. VM Names preference will be added to
            the end of the naming preferences if not present already.
          example:
            - type: LB_VIRTUAL_SERVERS
            - type: NSX_SECURITY_GROUPS
            - type: SECURITY_TAGS
            - type: VCENTER_TAGS
              values:
                - TestDB
                - TestDB2
                - Space
            - type: VM_NAMES
              values:
                - ".*?_([^-_@. ]*)-.*"
          items:
            $ref: '#/components/schemas/NamingPreference'
        discovery_options:
          type: array
          description: The ordered list of preferences to be used for discovery of
            applications and tiers to improve flow based application discovery. Add
            CSV enrichment preference to use the uploaded CSV in improving discovery.
            LB enrichment preference will be added at the end of the list if not present
            already.
          example:
            - type: CSV
              value: L3Zhci9saWIvdWJ1bnR1L3VwbG9hZC90ZW1wLzE2NzM5Mjk0NDAxMjQvTmFtaW5nIFByZWZlcmVuY2VzLmNzdg==
            - type: LB
          items:
            $ref: '#/components/schemas/DiscoveryOption'
      example:
        scope_object_type: 66
        scope_entities:
          - Cluster-3
          - Haas-cluster-adhoc
          - HaaS-Cluster-6
          - HaaS-Regression-Cluster-7
          - HaaS-Cluster-2
        full_fetch_flow_interval_in_sec: 604800
        pause_discovery: false
        application_naming_preferences:
          - type: LB_VIRTUAL_SERVERS
          - type: NSX_SECURITY_GROUPS
          - type: SECURITY_TAGS
          - type: VCENTER_TAGS
            values:
              - AppSystem
              - App Sys
              - App_ownership
          - type: VM_NAMES
            values:
              - ".*?_([^-_@. ]*)-([^-_@. ]*)-.*"
        tier_naming_preferences:
          - type: LB_VIRTUAL_SERVERS
          - type: NSX_SECURITY_GROUPS
          - type: SECURITY_TAGS
          - type: VCENTER_TAGS
            values:
              - TestDB
              - TestDB2
              - Space
          - type: VM_NAMES
            values:
              - ".*?_([^-_@. ]*)-.*"
        discovery_options:
          - type: CSV
            value: RkJBRF9URU1QX0ZJTEU6OklZTU9zQzd1NnQ5S0lEY0xybXRYRVEuY3N2
          - type: LB
