    ConfigPolling:
      type: object
      properties:
        config_polling_interval_in_min:
          type: string
          description: "Config polling interval to be provided in minutes. Preset\
            \ values are [10 min, 15 min, 30 min, 1 hour, 12 hours, 1 day, 3 days,\
            \ 5 days, 7 days]. For any other polling interval, CUSTOM polling interval\
            \ type should be used. Minimum- 10 minutes, Maximum- 7 days"
          example: "10"
        scheduled_config_polling_time:
          type: string
          description: Scheduled time (UTC) to be provided. This is only applicable
            when config_polling_interval_type is SCHEDULED
          example: 2:00
        scheduled_config_polling_days:
          type: string
          description: Scheduled config polling days. Supported values are weekdays.
            Multiple days separated with comma can be supplied. This is only applicable
            when config_polling_interval_type is SCHEDULED
          example: "MONDAY,TUESDAY"
        config_polling_interval_type:
          $ref: '#/components/schemas/ConfigPollingIntervalType'
    Schedule:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ScheduleType'
        value:
          $ref: '#/components/schemas/ScheduleValue'
    ScheduleType:
      type: string
      description: "Schedule type. Supported values are RUN_ONCE, RECURRENT"
      example: RUN_ONCE
      nullable: true
      enum:
        - RUN_ONCE
        - RECURRENT
    ScheduleValue:
      type: object
      properties:
        recurrenceType:
          $ref: '#/components/schemas/RecurrenceType'
        time:
          type: string
          description: Scheduled time (UTC) to be provided in the format Hours:Minutes
            (0-23:0-59)
          example: 2:10
        dayOfWeek:
          type: string
          description: DAY of the Week to be provided in the format  1-7 -> SUNDAY-SATURDAY
          example: "5"
        dayOfMonth:
          type: string
          description: Day of Month to be provided in the format 1-31
          example: "3"
        month:
          type: string
          description: Month to be provided in the format 1-12
          example: "2"
        year:
          type: string
          description: Year to be provided in the format 2022
          example: "2022"
        interval:
          type: integer
          description: Interval at which CUSTOM RecurrenceType job to be run
          format: int32
          example: 4
        intervalType:
          $ref: '#/components/schemas/IntervalType'
    RecurrenceType:
      type: string
      description: "Recurrence type. Supported values are DAILY, WEEKLY, MONTHLY,\
        \ CUSTOM"
      example: DAILY
      nullable: true
      enum:
        - DAILY
        - WEEKLY
        - MONTHLY
        - CUSTOM
    IntervalType:
      type: string
      description: "Interval type. Supported values are DAY, WEEK, MONTH applicable\
        \ only for CUSTOM RecurrenceType"
      example: DAY
      nullable: true
      enum:
        - DAY
        - WEEK
        - MONTH
