paths:
  /auth/token:
    post:
      tags:
        - Authentication
      summary: Create an auth token
      description: "<html><body> VCF Operations for networks supports token based authentication.\
        \ Tokens are non-modifiable identifiers returned by the system when the user\
        \ has successfully authenticated using valid credentials. Token expires after\
        \ expiry time returned in the response. All API requests must provide the\
        \ auth token in Authorization header in following format:<br> Authorization\
        \ &#58; NetworkInsight {token} <br> If a token is invalid or expired, 401-Unauthorized\
        \ error gets returned in the response of the API request. <br> There is limit\
        \ of 100 valid tokens per user and further requests will return 401-Unauthorized.\
        \ So, users are advised to delete the tokens after use <br> Expired tokens\
        \ are cleaned periodically by the system. </body></html>"
      operationId: create
      requestBody:
        description: User Credentials
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCredential'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
              example:
                token: 1rT7tm4riiACSfxrO2BvkA==
                expiry: 1509332642427
        "400":
          $ref: '#/components/responses/BadRequestResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
      security: []
      x-codegen-request-body-name: body
    delete:
      tags:
        - Authentication
      summary: Delete an auth token.
      description: |-
        Deletes the auth token provided in Authorization header.
        Deleting an expired or invalid token will result in 401 Unauthorized error.
      operationId: delete
      responses:
        "204":
          description: Success
          content: {}
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
  /auth/token/vidm:
    post:
      tags:
        - Authentication
      summary: Create an auth token for user mapped through VMware Identity Manager
      description: "<html><body> VCF Operations for networks supports token based authentication.\
        \ Tokens are non-modifiable identifiers returned by the system when the user\
        \ has been successfully authenticated using valid access token provided by\
        \ configured VMware Identity Manager appliance. Token expires after expiry\
        \ time (returned in the response). All API requests must provide the auth\
        \ token in Authorization header in following format:<br> Authorization &#58;\
        \ NetworkInsight {token} <br> If a token is invalid or expired, 401-Unauthorized\
        \ error gets returned in the response of the API request. </body></html>"
      operationId: createVidmUserToken
      requestBody:
        description: User access token provided by VMware Identity Manager.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VidmToken'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        "400":
          $ref: '#/components/responses/BadRequestResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'
        "404":
          $ref: '#/components/responses/NotFoundResponse'
        "412":
          $ref: '#/components/responses/PreconditionFailedResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
      security: []
      x-codegen-request-body-name: body
  /auth/vidm/client-id:
    get:
      tags:
        - Authentication
      summary: Get the client-id for making user access-token request to VMware Identity
        Manager
      description: |-
        Get client-id of password grant OAuth client registered at VMware Identity Manager.
        This client-id along with user credentials is required while making an access token request to VMware Identity Manager.
      operationId: getVidmOauthClienId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VidmOauthClientResponse'
        "403":
          $ref: '#/components/responses/ForbiddenResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
      security: []
