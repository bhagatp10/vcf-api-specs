        "403":
          $ref: '#/components/responses/ForbiddenResponse'
        "404":
          $ref: '#/components/responses/NotFoundResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
      x-codegen-request-body-name: body
    delete:
      tags:
        - Guided Network Troubleshooting
      summary: Removes Guided Network Troubleshooting incident
      description: Removes Guided Network Troubleshooting incident
      operationId: deleteTroubleshootingIncident
      parameters:
        - name: id
          in: path
          description: The Entity ID of object requestion information on
          required: true
          schema:
            type: string
      responses:
        "204":
          description: OK
          content: {}
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'
        "403":
          $ref: '#/components/responses/ForbiddenResponse'
        "404":
          $ref: '#/components/responses/NotFoundResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
