          type: string
          description: The raw text/string content for the log collector agent's configuration (INI, YAML, etc.).
        certificates:
          type: string
          description: Certificates are intended for establishing secure connections from the component to the destination log server.

    AlertConfigIntentResponse:
      type: object
      properties:
        alertType:
          type: string
          description: Intent type
          example: Intent
          nullable: true
          enum:
            - Intent
        categories:
          type: object
          properties:
            category:
              type: string
              example: APPLICATION_AWARE_NETWORK_ANALYTICS
            categoryName:
              type: string
        description:
          type: string
          description: Intent description
          example: Monitor traffic rate and total bandwidth for applications
        enabled:
          type: boolean
          example: true
        exceptionParams:
          type: array
          description: Exclusion parameters
          items:
            $ref: '#/components/schemas/IntentParam'
        filterRules:
          type: object
          properties:
            isValid:
              type: string
            filterType:
              type: string
              description: Entities to include/exclude
              nullable: true
              enum:
                - INCLUSION
                - EXCLUSION
            rules:
              type: array
              items:
                $ref: '#/components/schemas/FilterMembershipObject'
        intentTypeId:
          type: string
          description: Intent type
          example: MtuMismatch
          nullable: true
          enum:
            - APPLICATION_FLOW_HEALTH
            - APPLICATION_FLOW_UTILIZATION
            - DuplexMismatch
            - DuplicateIPAddress
            - DuplicateMacAddress
            - HSRPConfiguration
            - HsrpStpColocation
            - Loop
            - MtuMismatch
            - NativeVlanMismatch
            - NativeVlanTaggingMismatch
            - PortChannelMismatch
            - PortModeMismatch
            - Reachability
            - Segmentation
            - StigAccountPasswd
            - StigConsolePasswd
            - StigDefaultPasswd
            - StigMgmtPasswd
            - StigPlaintextPasswd
            - StpMetricInconsistency
            - TrunkPortVlanMismatch
        modelKey:
          type: string
          description: Intent model key
        name:
          type: string
          description: Intent name
          example: mtuCheck
        notes:
          type: string
          description: Intent notes
          example: Mtu check
        notificationSettings:
          type: array
          items:
            $ref: '#/components/schemas/IntentNotification'
        paramValues:
          type: array
          description: Intent parameters
          items:
            $ref: '#/components/schemas/IntentParam'
        selected_scope:
          type: string
          description: Intent scope
          example: All Applications
        severity:
          type: string
          description: Intent severity
          example: Info
          nullable: true
          enum:
            - Warning
            - Critical
            - Moderate
            - Info
        tags:
          type: array
          items:
            type: string
            description: Intent tags
            example: ""
  responses:
    BadRequestResponse:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnauthorizedResponse:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ForbiddenResponse:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFoundResponse:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    AlreadyExistResponse:
      description: Already Exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalErrorResponse:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ConflictResponse:
