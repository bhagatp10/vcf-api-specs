              example: 1
            numOfActiveEnterpriseLicense:
              type: integer
              description: Total Number of active Enterprise licenses (non-expired
                and licenses from last major version during grace period)
              format: int32
              example: 2
            numOfActiveSDWANLicense:
              type: integer
              description: Total Number of active SDWAN licenses (non-expired and
