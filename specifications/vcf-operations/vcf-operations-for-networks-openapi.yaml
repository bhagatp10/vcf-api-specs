      properties:
        scope_object_type:
          type: integer
          description: The type of objects in the scope entities
          format: int32
          example: 66
          default: 0
        scope_entities:
          type: array
          description: The list of name of the entities to be considered in discovery
            scope
          example:
            - Cluster-3
            - Haas-cluster-adhoc
            - HaaS-Cluster-6
            - HaaS-Regression-Cluster-7
            - HaaS-Cluster-2
          items:
            type: string
