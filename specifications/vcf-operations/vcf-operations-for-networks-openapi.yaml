      summary: Intent Creation
      description: Intent Creation
      operationId: createIntent
      requestBody:
        description: |-
          Add a new Intent Configuration; Available values for highlighted field names:
          **alertType**: [ Intent, SdwanIntent ]
          **enabled** : [ true , false ]
          **severity** : [ Warning, Critical, Moderate, Info ]
          **intentTypeId** : [ MtuMismatch, HsrpStpColocation, PortModeMismatch, NativeVlanMismatch, TrunkPortVlanMismatch, DuplexMismatch, PortChannelMismatch, DuplicateMacAddress, DuplicateIPAddress, StpMetricInconsistency ]

          Some of these intent types support additional paramters. Available parameters values for those intent types are as follows:
          | intentTypeId           | paramValues.id      | ValueType   | Values                             |
          | ---------------------- | ------------------- | ------------| -----------------------------------|
          | DuplexMismatch         | CheckMgmtInterface  | BOOLEAN     | true , false                       |
          |                        | SkipWhenNoInfo      | BOOLEAN     | true , false                       |
          |                        | SkipAutoDuplex      | BOOLEAN     | true , false                       |
          | HsrpConfiguration      | SkipDownInterfaces  | BOOLEAN     | true , false                       |
          |                        | CheckActiveStandby  | BOOLEAN     | true , false                       |
          |                        | CheckSingleActive   | BOOLEAN     | true , false                       |
          | MtuMismatch            | CheckMgmtInterface  | BOOLEAN     | true , false                       |
          |                        | SkipWhenNoInfo      | BOOLEAN     | true , false                       |
          | DuplicateMacAddress    |  --                 |             |                                    |
          | DuplicateIPAddress     |  --                 |             |                                    |
          | HsrpStpColocation      |  --                 |             |                                    |
          | NativeVlanMismatch     |  --                 |             |                                    |
          | NativeVlanTagMismatch  |  --                 |             |                                    |
          | PortChannelMismatch    |  --                 |             |                                    |
          | PortModeMismatch       |  --                 |             |                                    |
          | StpMetricInconsistency |  --                 |             |                                    |
          | TrunkPortVlanMismatch  |  --                 |             |                                    |
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertConfigIntentObject'
