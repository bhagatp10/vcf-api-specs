  /data-sources/vcenters:
    get:
      tags:
        - Data Sources
      summary: List vCenter data sources
      description: List vCenter data sources
      operationId: listVcenters
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSourceListResponse'
              example:
                results:
