          application/json:
            schema:
              $ref: '#/components/schemas/VCenterDataSourceRequest'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VCenterDataSource'
              example:
                entity_id: 18230:902:993642895
                entity_type: VCenterDataSource
                ip: 10.197.17.68
                fqdn:  null
                proxy_id: 18230:901:1585583463
                nickname: My vCenter
                enabled: true
                notes: Located in DC1
                credentials:
                  username: administrator@vsphere.local
                  password: ""
                ipfix_response:
                  ipfix_enabled_for: "dvs-54,dvs-67,dvs-71"
        "400":
          $ref: '#/components/responses/BadRequestResponse'
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'
        "403":
          $ref: '#/components/responses/ForbiddenResponse'
        "500":
