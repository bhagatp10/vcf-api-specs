      summary: Shows Guided Network Troubleshooting incidents
      description: Shows Guided Network Troubleshooting incidents
      operationId: listTroubleshootingIncidents
      parameters:
        - name: size
          in: query
          description: Page size of results
          schema:
            type: number
            default: 10
        - name: cursor
          in: query
          description: Cursor from previous response
          schema:
            type: string
        - name: start_entity_id
          in: query
          description: Start Entity ID
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTroubleshootingIncidentList'
        "401":
          $ref: '#/components/responses/UnauthorizedResponse'
        "403":
          $ref: '#/components/responses/ForbiddenResponse'
        "404":
          $ref: '#/components/responses/NotFoundResponse'
        "500":
          $ref: '#/components/responses/InternalErrorResponse'
    post:
      tags:
