      - Snapservice.Sessions
      description: "Returns information about the current session. This operation\
        \ expects a valid session token to be supplied. \n\n A side effect of invoking\
        \ this operation may be a change to the session's last accessed time to the\
        \ current time if this is supported by the session implementation. Invoking\
        \ any other operation in the API will also update the session's last accessed\
        \ time. \n\n This API is meant to serve the needs of various front end projects\
        \ that may want to display the name of the user. Examples of this include\
        \ various web based user interfaces and logging facilities.\n\nThis operation\
        \ was added in __vSphere API 9.0.0.0__."
      operationId: Snapservice.Sessions_get
      responses:
        "401":
          description: ' if the session id is missing from the request or the corresponding
            session object cannot be found.'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "503":
          description: " if session retrieval fails due to server specific issues\
            \ e.g. connection to back end component is failing. Due to the security\
            \ nature of this API further details will not be disclosed in the error.\
            \ Please refer to component health information, administrative logs and\
            \ product specific documentation for possible causes."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "200":
          description: Information about the session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapservice.Sessions.Info"
      security:
      - api_key_auth: []
    post:
      tags:
      - Snapservice.Sessions
      description: "Creates a session with the API. This is the equivalent of login.\
        \ This operation exchanges user credentials supplied in the security context\
        \ for a session token that is to be used for authenticating subsequent calls.\
        \ \n\nTo authenticate subsequent calls clients are expected to include the\
        \ session token. For REST API calls the HTTP `vmware-api-session-id` header\
        \ field should be used for this.\n\nThis operation was added in __vSphere\
        \ API 9.0.0.0__."
      operationId: Snapservice.Sessions_create
      responses:
        "401":
          description: " if the session creation fails due to request specific issues.\
            \ Due to the security nature of the API the details of the error are not\
            \ disclosed. \n\n Please check the following preconditions if using a\
            \ SAML token to authenticate: \n   - the supplied token is delegate-able.\n\
            \   - the time of client and server system are synchronized.\n   - the\
            \ token supplied is valid.\n   - if bearer tokens are used check that\
            \ system configuration allows the API endpoint to accept such tokens.\n\
            \ "
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "503":
          description: " if session creation fails due to server specific issues,\
            \ for example connection to a back end component is failing. Due to the\
            \ security nature of this API further details will not be disclosed in\
            \ the error. Please refer to component health information, administrative\
            \ logs and product specific documentation for possible causes."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "201":
          description: Newly created session token to be used for authenticating further
            requests.
          content:
            application/json:
              schema:
                type: string
                format: password
      security:
      - api_key_auth: []
    delete:
      tags:
      - Snapservice.Sessions
      description: "Terminates the validity of a session token. This is the equivalent\
        \ of log out. \n\n A session token is expected as part of the request. \n\n\
        \n\nThis operation was added in __vSphere API 9.0.0.0__."
      operationId: Snapservice.Sessions_delete
      responses:
        "401":
          description: ' if the session id is missing from the request or the corresponding
            session object cannot be found.'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "503":
          description: " if session deletion fails due to server specific issues,\
            \ for example connection to a back end component is failing. Due to the\
            \ security nature of this API further details will not be disclosed in\
            \ the error. Please refer to component health information, administrative\
            \ logs and product specific documentation for possible causes."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "204":
          description: Success!
      security:
      - api_key_auth: []
  /snapservice/sites?action=probe:
    post:
      tags:
      - Snapservice.Sites
      description: "Probe SSL connection to a remote vCenter and Data Protection Virtual\
        \ Appliance. This API returns vCenter/Data Protection Virtual Appliance certificates.\
        \ \n\n If vCenter certificate is already not trusted, the API will return\
        \ vCenter certificate with probe status as partial. User is expected to invoke\
        \ probe API again with the user accepted vCenter certificate. Once the vCenter\
        \ certificate accepted by the user is supplied to probe API, the API will\
        \ return with probe status as completed along with Data Protection Virtual\
        \ Appliance certificate. If Data Protection Virtual Appliance certificate\
        \ is not trusted, user is expected to accept Data Protection appliance certificate\
        \ and supply user accepted vCenter and Data Protection Virtual Appliance certificates\
        \ as input to Add/Update site API. \n\n If vCenter and Data Protection Virtual\
        \ Appliance certificates are already trusted, the API will respond with probe\
        \ status as completed. User can proceed with invoking Add/Update site API\
        \ with no vCenter and Data Protection Virtual Appliance certificates.\n\n\
        This operation was added in __vSphere API 9.0.0.0__.\n\nReturns an authorization\
        \ error if you do not have all of the privileges described as follows: \n\
        \   -  Operation execution requires `VsanDP.Replication.com.vmware.vsan.snapshotservice.Site.View`.\
        \ \n"
      operationId: Snapservice.Sites_probe
      requestBody:
        description: Spec used to probe remote vCenter and Data Protection Virtual
          Appliance connection.
        content:
          application/json:
