      - PAUSED
      - FULL_SYNC
      - INITIAL_FULL_SYNC
      - SYNC
      - NOT_ACTIVE
      - OK
      - UNKNOWN
      - RECOVERING
      - RECOVERED
      - DISK_RESIZING
      - CONFIGURATION_ERROR
    Snapservice.Clusters.VirtualMachines.ReplicationErrorType:
      type: string
      description: |-
        The Snapservice.Clusters.VirtualMachines.ReplicationErrorType enumerated type contains the supported values for the replication error types of a virtual machine. NOTE: This list of errors is not exhaustive. It includes only known cases that the user can take action for.

        Possible values:
          - `INSUFFICIENT_LICENSE`: Virtual machine replication configuration failed due to invalid license.
          - `INVALID_SEED`: Virtual machine replication configuration failed due to seeding configuration error.
          - `INVALID_TARGET_DATASTORE`: Virtual machine replication configuration failed due to datastore configuration error.
          - `UNKNOWN`: Virtual machine replication failed due to unknown error.


        This enumeration was added in __vSphere API 9.1.0.0__.
      enum:
      - INSUFFICIENT_LICENSE
      - INVALID_SEED
      - INVALID_TARGET_DATASTORE
      - UNKNOWN
    Snapservice.Clusters.VirtualMachines.FilterSpec:
