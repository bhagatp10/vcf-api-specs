          deprecated: true
        error_type:
          type: string
          description: |-
            Virtual machine replication error type.

            Possible values:
              - `INSUFFICIENT_LICENSE`: Virtual machine replication configuration failed due to invalid license.
              - `INVALID_SEED`: Virtual machine replication configuration failed due to seeding configuration error.
              - `INVALID_TARGET_DATASTORE`: Virtual machine replication configuration failed due to datastore configuration error.
              - `UNKNOWN`: Virtual machine replication failed due to unknown error.


            For more information see: *Snapservice.Clusters.VirtualMachines.ReplicationErrorType*.

            This property was added in __vSphere API 9.1.0.0__.

            This property is optional and it is only relevant when the value of status is one of *Snapservice.Clusters.VirtualMachines.ReplicationStatus.ERROR* or *Snapservice.Clusters.VirtualMachines.ReplicationStatus.CONFIGURATION_ERROR*.
        cluster_pair:
