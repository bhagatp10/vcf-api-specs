          - $ref: "#/components/schemas/Snapservice.Tasks.Progress"
        result:
          description: "Result of the operation. \n\n\n\nThis property was added in\
            \ __vSphere API 8.0.3.0__.\n\nThis property will be missing or `null`\
            \ if the operation does not return a result or if the result is not available\
            \ at the current step of the operation."
        vc_task:
          type: string
          description: |-
            Associated vCenter task for the given task.

            This property was added in __vSphere API 8.0.3.0__.

            This property will be missing or `null` if there is no corresponding VC task created.
        description:
          description: |-
            Description of the operation associated with the task.

            This property was added in __vSphere API 8.0.3.0__.
          allOf:
          - $ref: "#/components/schemas/Vapi.Std.LocalizableMessage"
        service:
          type: string
          description: |-
            Identifier of the service containing the operation.

            This property was added in __vSphere API 8.0.3.0__.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `com.vmware.snapservice.service`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `com.vmware.snapservice.service`.
        operation:
          type: string
          description: |-
            Identifier of the operation associated with the task.

            This property was added in __vSphere API 8.0.3.0__.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `com.vmware.snapservice.operation`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `com.vmware.snapservice.operation`.
        parent:
          type: string
          description: |-
            Parent of the current task.

            This property was added in __vSphere API 8.0.3.0__.

            This property will be missing or `null` if the task has no parent.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `com.vmware.snapservice.task`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `com.vmware.snapservice.task`.
        target:
          description: |-
            Identifier of the target created by the operation or an existing one the operation performed on.

            This property was added in __vSphere API 8.0.3.0__.

            This property will be missing or `null` if the operation has no target or multiple targets.
          allOf:
          - $ref: "#/components/schemas/Vapi.Std.DynamicID"
        status:
          type: string
          description: "Status of the operation associated with the task.\n\nPossible\
            \ values:\n  - `PENDING`: The operation is in pending state.\n  - `RUNNING`:\
            \ The operation is in progress.\n  - `BLOCKED`: The operation is blocked.\
            \ \n\n The operation could be blocked if the system is waiting for resources\
            \ to be available to perform the operation.\n  - `SUCCEEDED`: The operation\
            \ completed successfully.\n  - `FAILED`: The operation failed.\n\n\nFor\
            \ more information see: *Snapservice.Tasks.Status*.\n\nThis property was\
            \ added in __vSphere API 8.0.3.0__."
        cancelable:
          type: boolean
          description: |-
            Flag to indicate whether or not the operation can be cancelled. The value may change as the operation progresses.

            This property was added in __vSphere API 8.0.3.0__.
        error:
          type: object
          description: |-
            Description of the error if the operation status is "FAILED".

            This property was added in __vSphere API 8.0.3.0__.

            If missing or `null` the description of why the operation failed will be included in the result of the operation (see *Snapservice.Tasks.Info.result*).
        start_time:
          type: string
          description: |-
            Time when the operation is started.

            This property was added in __vSphere API 8.0.3.0__.

            This property is optional and it is only relevant when the value of status is one of *Snapservice.Tasks.Status.RUNNING*, *Snapservice.Tasks.Status.BLOCKED*, *Snapservice.Tasks.Status.SUCCEEDED*, or *Snapservice.Tasks.Status.FAILED*.
          format: date-time
        end_time:
          type: string
          description: |-
            Time when the operation is completed.

            This property was added in __vSphere API 8.0.3.0__.

            This property is optional and it is only relevant when the value of status is one of *Snapservice.Tasks.Status.SUCCEEDED* or *Snapservice.Tasks.Status.FAILED*.
          format: date-time
        user:
          type: string
          description: |-
            Name of the user who performed the operation.

            This property was added in __vSphere API 8.0.3.0__.

            This property will be missing or `null` if the operation is performed by the system.
      description: |-
        The Snapservice.Tasks.Info schema contains information about a task.

        This schema was added in __vSphere API 8.0.3.0__.
    Snapservice.VirtualMachines.ProtectionConfiguration.TargetStorageSpec:
      type: object
      properties:
        datastore:
          type: string
          description: |-
            Target datastore.

            This property was added in __vSphere API 9.1.0.0__.

            This property is being kept optional for future use-cases, but mandatory in the current version.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `Datastore`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `Datastore`.
      description: |-
        The Snapservice.VirtualMachines.ProtectionConfiguration.TargetStorageSpec schema contains properties that describe the settings to configure virtual machine level target storage for the replication.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationTarget:
      type: object
      properties:
        use_replica_seed:
          type: boolean
          description: |-
            Specify if replica seed file is used for replication.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` no virtual machine override is set and the default protection group configuration is used.
        replication_path:
          type: string
          description: |-
            Path within the datastore where the virtual machine should be replicated or seed files are located. If not specified, the default path will be used. By default, the virtual machine name is used as the replication path. An example of replication path is "VMParent/VM1".

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` no virtual machine override is set and the default path is used.
        target_storage_spec:
          description: |-
            Specify the virtual machine level target storage spec for virtual machine replication.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` the default protection group configuration is used.
          allOf:
          - $ref: "#/components/schemas/Snapservice.VirtualMachines.ProtectionConfiguration.TargetStorageSpec"
      description: |-
        The Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationTarget schema contains properties to specify target configuration overrides for a virtual machine. This structure is used by both get and update APIs.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationConfigurationInfo:
      required:
      - replication_target
      type: object
      properties:
        replication_target:
          description: |-
            Replication target configuration used for replication.

            This property was added in __vSphere API 9.1.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationTarget"
      description: |-
        The Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationConfigurationInfo schema contains properties that provide information regarding the virtual machine level replication configuration overrides for a virtual machine.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.ProtectionConfiguration.Info:
      required:
      - replication_config_info
      type: object
      properties:
        replication_config_info:
          type: array
          description: "List of virtual machine replication configuration that overrides\
            \ the global PG level settings. If replication is not enabled or no overrides\
            \ are defined, an empty list is returned. \n\n Currently, we only support\
            \ one replication configuration per vm, so this list can have a max of\
            \ only one entry.\n\nThis property was added in __vSphere API 9.1.0.0__."
          items:
            $ref: "#/components/schemas/Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationConfigurationInfo"
      description: |-
        The Snapservice.VirtualMachines.ProtectionConfiguration.Info schema contains properties that provide information regarding the virtual machine level protection configuration overrides for virtual machine.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationConfigurationUpdateSpec:
      type: object
      properties:
        replication_target:
          description: |-
            Specify replication target configuration to be used for virtual machine replication. The replication target configuration can only be updated if the virtual machine replication has not yet started.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` clear virtual machine overrides for target configuration and use the default pg configuration.
          allOf:
          - $ref: "#/components/schemas/Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationTarget"
      description: "The Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationConfigurationUpdateSpec\
        \ schema contains properties to configure virtual machine replication. \n\n\
        \ At least one parameter needs to be specified when updating the replication\
        \ configuration.\n\nThis schema was added in __vSphere API 9.1.0.0__."
    Snapservice.VirtualMachines.ProtectionConfiguration.UpdateSpec:
      type: object
      properties:
        replication_config_update_spec:
          type: array
          description: |-
            Optional list of virtual machine replication configuration that overrides the global PG level settings. Currently, we only support one replication configuration per VM, so this parameter is mandatory, with a single entry.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null`, do not modify the existing virtual machine replication configurations. This parameter is currently mandatory, but kept optional for the future.
          items:
            $ref: "#/components/schemas/Snapservice.VirtualMachines.ProtectionConfiguration.ReplicationConfigurationUpdateSpec"
      description: |-
        The Snapservice.VirtualMachines.ProtectionConfiguration.UpdateSpec schema contains properties to configure virtual machine protection, that overrides the global PG level settings. Currently we only support replication configuration, but it can be extended in the future to support other virtual machine configurations.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.Snapshots.FilterSpec:
      type: object
      properties:
        created_after:
          type: string
          description: |-
            Minimum creation date for the snapshots that must match the filter.

            This property was added in __vSphere API 9.1.0.0__.

            If missing or `null` snapshots with any creation time match the filter.
          format: date-time
        created_before:
          type: string
          description: |-
            Maximum creation date for the snapshots that must match the filter.

            This property was added in __vSphere API 9.1.0.0__.

            If missing or `null` snapshots with any creation time match the filter.
          format: date-time
        snapshots_per_vm:
          type: integer
          description: |-
            Specifies the number of snapshots to be retrieved per virtual machine.

            This property was added in __vSphere API 9.1.0.0__.

            If missing or `null` defaults to a size defined by the service.
          format: int64
      description: |-
        The Snapservice.VirtualMachines.Snapshots.FilterSpec schema contains properties used to filter the results when listing virtual machine snapshots for virtual machines. See *GET /snapservice/virtual-machines/snapshots*. When multiple filters are specified, it operates as an AND operation. The snapshots returned will match all the specified filters.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.Snapshots.IterationSpec:
      type: object
      properties:
        page_size:
          type: integer
          description: |-
            Specifies the maximum number of results to return.

            This property was added in __vSphere API 9.1.0.0__.

            If missing or `null` defaults to a size defined by the service.
          format: int64
        offset:
          type: integer
          description: |-
            Used to retrieve paged data for larger result sets. The offset indicates how many starting elements to be skipped in a sorted list of items. If the offset is greater than or equal to the number of items in the list, empty response is returned by the server.

            This property was added in __vSphere API 9.1.0.0__.

            missing or `null` the offset will be 0
          format: int64
      description: |-
        The Snapservice.VirtualMachines.Snapshots.IterationSpec schema contains properties used to break results into pages when listing virtual machine snapshots for virtual machines. see *GET /snapservice/virtual-machines/snapshots*.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.Snapshots.ListItem:
      required:
      - creation_time
      - name
      - snapshot
      - snapshot_type
      - vm
      type: object
      properties:
        name:
          type: string
          description: |-
            Name of the virtual machine snapshot.

            This property was added in __vSphere API 9.1.0.0__.
        snapshot:
          type: string
          description: |-
            Identifier of the virtual machine snapshot.

            This property was added in __vSphere API 9.1.0.0__.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `com.vmware.snapservice.vm.snapshot`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `com.vmware.snapservice.vm.snapshot`.
        vm:
          type: string
          description: |-
            Identifier of the virtual machine.

            This property was added in __vSphere API 9.1.0.0__.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `VirtualMachine`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `VirtualMachine`.
        vm_bios_uuid:
          type: string
          description: |-
            BIOS identifier of the virtual machine.

            This property was added in __vSphere API 9.1.0.0__.

            If missing or `null` or empty, virtual machines with any BIOS identifier match the filter.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `VirtualMachine`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `VirtualMachine`.
        creation_time:
          type: string
          description: |-
            Creation time of virtual machine snapshot. Time is in UTC format. If the snapshot operation fails, start time of the operation is returned.

            This property was added in __vSphere API 9.1.0.0__.
          format: date-time
        expiration_time:
          type: string
          description: |-
            Expiration time of virtual machine snapshot. Time is in UTC format.

            This property was added in __vSphere API 9.1.0.0__.

            If missing or `null` no expiry time is set for the virtual machine snapshot.
          format: date-time
        snapshot_type:
          type: string
          description: |-
            Type of virtual machine snapshot.

            Possible values:
              - `SCHEDULED`: Indicates that a snapshot was taken as part of a periodic schedule.
              - `ONE_TIME`: Indicates that the snapshot was taken as a one time operation triggered by the user.
              - `SYSTEM_CREATED`: Indicates that the snapshot was taken by the system
              - `STAGED`: Indicates that the vm snapshot was taken as part of a ransomware recovery staging operation.

            This constant was added in __vSphere API 9.1.0.0__.


            For more information see: *Snapservice.Clusters.VirtualMachines.Snapshots.Type*.

            This property was added in __vSphere API 9.1.0.0__.
        labels:
          type: array
          description: |-
            All the labels associated with this Snapshot. if the snapshot does not have any labels this will be empty

            This property was added in __vSphere API 9.1.0.0__.

            This property is optional because it was added in a newer version than its parent node.
          items:
            $ref: "#/components/schemas/Snapservice.Snapshots.Label"
      description: |-
        The Snapservice.VirtualMachines.Snapshots.ListItem schema contains information about a virtual machine snapshot returned by *GET /snapservice/virtual-machines/snapshots* operation

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.Snapshots.ListResult:
      required:
      - snapshots
      - total_count
      type: object
      properties:
        snapshots:
          type: array
          description: |-
            List of virtual machine snapshot items.

            This property was added in __vSphere API 9.1.0.0__.
          items:
            $ref: "#/components/schemas/Snapservice.VirtualMachines.Snapshots.ListItem"
        total_count:
          type: integer
          description: |-
            The paginated list may contain partial result, this field provides total number of items with the given filters applied.

            This property was added in __vSphere API 9.1.0.0__.
          format: int64
      description: |-
        The Snapservice.VirtualMachines.Snapshots.ListResult schema represents the result of *GET /snapservice/virtual-machines/snapshots* operation. The result list is pre sorted by *Snapservice.VirtualMachines.Snapshots.ListItem.creation_time* of the virtual machine snapshot.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.Snapshots.UpdateSpec:
      type: object
      properties:
        delete_after:
          description: |-
            Time period after which the snapshot can be deleted, starting from the current time. This field is currently mandatory, but kept optional for the future.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` existing snapshot retention will be retained.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TimePeriod"
      description: |-
        The Snapservice.VirtualMachines.Snapshots.UpdateSpec schema contains properties that describe the desired virtual machine snapshot attributes.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.Snapshots.AddLabelSpec:
      required:
      - label
      type: object
      properties:
        label:
          description: |-
            Information regarding the label to be added to the snapshot.

            This property was added in __vSphere API 9.1.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.Snapshots.Label"
      description: |-
        The Snapservice.VirtualMachines.Snapshots.AddLabelSpec schema contains information regarding the label to be added to the snapshot.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.Snapshots.DeleteLabelSpec:
      required:
      - label
      type: object
      properties:
        label:
          description: |-
            One snapshot label info.

            This property was added in __vSphere API 9.1.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.Snapshots.Label"
      description: |-
        The Snapservice.VirtualMachines.Snapshots.DeleteLabelSpec schema contains information regarding the label to be deleted from the snapshot.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VirtualMachines.Snapshots.SetLabelsSpec:
      required:
      - category
      - names
      type: object
      properties:
        category:
          type: string
          description: |-
            Information regarding the label category to be set to the snapshot.

            This property was added in __vSphere API 9.1.0.0__.
        names:
          type: array
          description: |-
            Information regarding the label names to be set to the snapshot.

            This property was added in __vSphere API 9.1.0.0__.
          items:
            type: string
      description: |-
        The Snapservice.VirtualMachines.Snapshots.SetLabelsSpec schema contains information regarding the labels to be set to the snapshot.

        This schema was added in __vSphere API 9.1.0.0__.
    Vapi.Std.DynamicID:
      required:
      - id
      - type
      type: object
      properties:
        type:
          type: string
          description: "The type of resource being identified (for example `com.acme.Person`).\
            \ \n\n Resources that contain operations for creating and deleting resources\
            \ typically contain a constant specifying the resource type for the resources\
            \ being created and deleted. The API metamodel metadata resources include\
            \ a resource that allows retrieving all the known resource types."
        id:
          type: string
          description: |-
            The identifier for a resource whose type is specified by *Vapi.Std.DynamicID.type*.

            When clients pass a value of this schema as a parameter, the property type must contain the actual resource type. When operations return a value of this schema as a response, the property type will contain the actual resource type.
      description: The Vapi.Std.DynamicID schema represents an identifier for a resource
        of an arbitrary type.
    Vapi.Std.LocalizableMessage:
      required:
      - args
      - default_message
      - id
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier of the localizable string or message template.\
            \ \n\n This identifier is typically used to retrieve a locale-specific\
            \ string or message template from a message catalog."
        default_message:
          type: string
          description: "The value of this localizable string or message template in\
            \ the `en_US` (English) locale. If *Vapi.Std.LocalizableMessage.id* refers\
            \ to a message template, the default message will contain the substituted\
            \ arguments. This value can be used by clients that do not need to display\
            \ strings and messages in the native language of the user. It could also\
            \ be used as a fallback if a client is unable to access the appropriate\
            \ message catalog."
        args:
          type: array
          description: Positional arguments to be substituted into the message template.
            This list will be empty if the message uses named arguments or has no
            arguments.
          items:
            type: string
        params:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Vapi.Std.LocalizationParam"
          description: |-
            Named arguments to be substituted into the message template.

            This property was added in __vSphere API 7.0.0.0__.

            Missing or `null` means that the message template requires no arguments or positional arguments are used.
        localized:
          type: string
          description: |-
            Localized string value as per request requirements.

            This property was added in __vSphere API 7.0.0.0__.

            when the client has not requested specific locale the implementation may not populate this field to conserve resources.
      description: The Vapi.Std.LocalizableMessage schema represents localizable string
        and message template. Resources include one or more localizable message templates
        in the errors they report so that clients can display diagnostic messages
        in the native language of the user. Resources can include localizable strings
        in the data returned from operations to allow clients to display localized
        status information in the native language of the user.
    Vapi.Std.LocalizationParam:
      type: object
      properties:
        s:
          type: string
          description: |-
            String value associated with the parameter.

            This property was added in __vSphere API 7.0.0.0__.

            this property will be set when string value is used.
        dt:
          type: string
          description: |-
            Date and time value associated with the parameter. Use the format property to specify date and time display style.

            This property was added in __vSphere API 7.0.0.0__.

            this property will be set when date and time value is used.
          format: date-time
        i:
          type: integer
          description: |-
            long value associated with the parameter.

            This property was added in __vSphere API 7.0.0.0__.

            this property will be set when long value is used.
          format: int64
        d:
          type: number
          description: |-
            The double value associated with the parameter. The number of displayed fractional digits is changed via precision property.

            This property was added in __vSphere API 7.0.0.0__.

            this property will be set when double value is used.
          format: double
        l:
          description: |-
            Nested localizable value associated with the parameter. This is useful construct to convert to human readable localized form enumerated type and boolean values. It can also be used for proper handling of pluralization and gender forms in localization. Recursive Vapi.Std.NestedLocalizableMessage instances can be used for localizing short lists of items.

            This property was added in __vSphere API 7.0.0.0__.

            this property will be set when nested localization message value is used.
          allOf:
          - $ref: "#/components/schemas/Vapi.Std.NestedLocalizableMessage"
        format:
          type: string
          description: |-
            Format associated with the date and time value in dt property. The enumeration value `SHORT_DATETIME` will be used as default.

            Possible values:
              - `SHORT_DATE`: The date and time value will be formatted as short date, for example *2019-01-28*
              - `MED_DATE`: The date and time value will be formatted as medium date, for example *2019 Jan 28*
              - `LONG_DATE`: The date and time value will be formatted as long date, for example *2019 Jan 28*
              - `FULL_DATE`: The date and time value will be formatted as full date, for example *2019 Jan 28, Mon*
              - `SHORT_TIME`: The date and time value will be formatted as short time, for example *12:59*
              - `MED_TIME`: The date and time value will be formatted as medium time, for example *12:59:01*
              - `LONG_TIME`: The date and time value will be formatted as long time, for example *12:59:01 Z*
              - `FULL_TIME`: The date and time value will be formatted as full time, for example *12:59:01 Z*
              - `SHORT_DATE_TIME`: The date and time value will be formatted as short date and time, for example *2019-01-28 12:59*
              - `MED_DATE_TIME`: The date and time value will be formatted as medium date and time, for example *2019 Jan 28 12:59:01*
              - `LONG_DATE_TIME`: The date and time value will be formatted as long date and time, for example *2019 Jan 28 12:59:01 Z*
              - `FULL_DATE_TIME`: The date and time value will be formatted as full date and time, for example *2019 Jan 28, Mon 12:59:01 Z*


            For more information see: *Vapi.Std.LocalizationParam.DateTimeFormat*.

            This property was added in __vSphere API 7.0.0.0__.

            this may not be set if enumeration value `SHORT_DATETIME` default format is appropriate
        precision:
          type: integer
          description: |-
            Number of fractional digits to include in formatted double value.

            This property was added in __vSphere API 7.0.0.0__.

            this will be set when exact precision is required for rendering double numbers.
          format: int64
      description: |-
        This schema holds a single message parameter and formatting settings for it. The schema has fields for string, long, double, date time and nested messages. Only one will be used depending on the type of data sent. For date, double and long it is possible to set additional formatting details.

        This schema was added in __vSphere API 7.0.0.0__.
    Vapi.Std.LocalizationParam.DateTimeFormat:
      type: string
      description: |-
        The Vapi.Std.LocalizationParam.DateTimeFormat enumerated type lists possible date and time formatting options. It combines the Unicode CLDR format types - full, long, medium and short with 3 different presentations - date only, time only and combined date and time presentation.

        Possible values:
          - `SHORT_DATE`: The date and time value will be formatted as short date, for example *2019-01-28*
          - `MED_DATE`: The date and time value will be formatted as medium date, for example *2019 Jan 28*
          - `LONG_DATE`: The date and time value will be formatted as long date, for example *2019 Jan 28*
          - `FULL_DATE`: The date and time value will be formatted as full date, for example *2019 Jan 28, Mon*
          - `SHORT_TIME`: The date and time value will be formatted as short time, for example *12:59*
          - `MED_TIME`: The date and time value will be formatted as medium time, for example *12:59:01*
          - `LONG_TIME`: The date and time value will be formatted as long time, for example *12:59:01 Z*
          - `FULL_TIME`: The date and time value will be formatted as full time, for example *12:59:01 Z*
          - `SHORT_DATE_TIME`: The date and time value will be formatted as short date and time, for example *2019-01-28 12:59*
          - `MED_DATE_TIME`: The date and time value will be formatted as medium date and time, for example *2019 Jan 28 12:59:01*
          - `LONG_DATE_TIME`: The date and time value will be formatted as long date and time, for example *2019 Jan 28 12:59:01 Z*
          - `FULL_DATE_TIME`: The date and time value will be formatted as full date and time, for example *2019 Jan 28, Mon 12:59:01 Z*


        This enumeration was added in __vSphere API 7.0.0.0__.
      enum:
      - SHORT_DATE
      - MED_DATE
      - LONG_DATE
      - FULL_DATE
      - SHORT_TIME
      - MED_TIME
      - LONG_TIME
      - FULL_TIME
      - SHORT_DATE_TIME
      - MED_DATE_TIME
      - LONG_DATE_TIME
      - FULL_DATE_TIME
    Vapi.Std.NestedLocalizableMessage:
      required:
      - id
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier of the localizable string or message template.\
            \ \n\n This identifier is typically used to retrieve a locale-specific\
            \ string or message template from a message catalog.\n\nThis property\
            \ was added in __vSphere API 7.0.0.0__."
        params:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Vapi.Std.LocalizationParam"
          description: |-
            Named Arguments to be substituted into the message template.

            This property was added in __vSphere API 7.0.0.0__.

            services will not populate this field when there are no parameters to be substituted
      description: |-
        The Vapi.Std.NestedLocalizableMessage schema represents a nested within a parameter localizable string or message template. This schema is useful for modeling composite messages. Such messages are necessary to do correct pluralization of phrases, represent lists of several items etc.

        This schema was added in __vSphere API 7.0.0.0__.
    Vapi.Std.Errors.AlreadyExists:
      type: object
      description: "The Vapi.Std.Errors.AlreadyExists error indicates that an attempt\
        \ was made to create an entity but the entity already exists. Typically the\
        \ entity has a name or identifier that is required to be unique in some context,\
        \ but there is already an entity with that name or identifier in that context.\
        \ \n\n Examples: \n   - Trying to create a new tag category when a tag category\
        \ with the specified name already exists.\n   - Trying to create a new tag\
        \ in tag category when a tag with the specified name already exists the tag\
        \ category.\n   - Trying to create a LUN with a specific UUID on a node (for\
        \ replication purposes) when a LUN with that UUID already exists on the node.\n\
        \   - Trying to create a file in a directory or move or copy a file to a directory\
        \ when a file with that name already exists in the directory. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.Error:
      required:
      - error_type
      - messages
      type: object
      properties:
        messages:
          type: array
          description: "Stack of one or more localizable messages for human error\
            \ consumers. \n\n The message at the top of the stack (first in the list)\
            \ describes the error from the perspective of the operation the client\
            \ invoked. \n\n Each subsequent message in the stack describes the \"\
            cause\" of the prior message."
          items:
            $ref: "#/components/schemas/Vapi.Std.LocalizableMessage"
        data:
          type: object
          description: "Data to facilitate clients responding to the operation reporting\
            \ a standard error to indicating that it was unable to complete successfully.\
            \ \n\n Operations may provide data that clients can use when responding\
            \ to errors. Since the data that clients need may be specific to the context\
            \ of the operation reporting the error, different operations that report\
            \ the same error may provide different data in the error. The documentation\
            \ for each each operation will describe what, if any, data it provides\
            \ for each error it reports. \n\n The *Vapi.Std.Errors.ArgumentLocations*,\
            \ *Vapi.Std.Errors.FileLocations*, and *Vapi.Std.Errors.TransientIndication*\
            \ schemas are intended as possible values for this property. *Vapi.Std.DynamicID*\
            \ may also be useful as a value for this property (although that is not\
            \ its primary purpose). Some resources may provide their own specific\
            \ schemas for use as the value of this property when reporting errors\
            \ from their operations.\n\nSome operations will not set this property\
            \ when reporting errors."
        error_type:
          type: string
          description: |-
            Discriminator field to help API consumers identify the structure type.

            Possible values:
              - `ERROR`: Discriminator for the *Vapi.Std.Errors.Error* type.
              - `ALREADY_EXISTS`: Discriminator for the *Vapi.Std.Errors.AlreadyExists* type.
              - `ALREADY_IN_DESIRED_STATE`: Discriminator for the *Vapi.Std.Errors.AlreadyInDesiredState* type.
              - `CANCELED`: Discriminator for the *Vapi.Std.Errors.Canceled* type.
              - `CONCURRENT_CHANGE`: Discriminator for the *Vapi.Std.Errors.ConcurrentChange* type.
              - `FEATURE_IN_USE`: Discriminator for the *Vapi.Std.Errors.FeatureInUse* type.
              - `INTERNAL_SERVER_ERROR`: Discriminator for the *Vapi.Std.Errors.InternalServerError* type.
              - `INVALID_ARGUMENT`: Discriminator for the *Vapi.Std.Errors.InvalidArgument* type.
              - `INVALID_ELEMENT_CONFIGURATION`: Discriminator for the *Vapi.Std.Errors.InvalidElementConfiguration* type.
              - `INVALID_ELEMENT_TYPE`: Discriminator for the *Vapi.Std.Errors.InvalidElementType* type.
              - `INVALID_REQUEST`: Discriminator for the *Vapi.Std.Errors.InvalidRequest* type.
              - `NOT_ALLOWED_IN_CURRENT_STATE`: Discriminator for the *Vapi.Std.Errors.NotAllowedInCurrentState* type.
              - `NOT_FOUND`: Discriminator for the *Vapi.Std.Errors.NotFound* type.
              - `OPERATION_NOT_FOUND`: Discriminator for the *Vapi.Std.Errors.OperationNotFound* type.
              - `RESOURCE_BUSY`: Discriminator for the *Vapi.Std.Errors.ResourceBusy* type.
              - `RESOURCE_IN_USE`: Discriminator for the *Vapi.Std.Errors.ResourceInUse* type.
              - `RESOURCE_INACCESSIBLE`: Discriminator for the *Vapi.Std.Errors.ResourceInaccessible* type.
              - `SERVICE_UNAVAILABLE`: Discriminator for the *Vapi.Std.Errors.ServiceUnavailable* type.
              - `TIMED_OUT`: Discriminator for the *Vapi.Std.Errors.TimedOut* type.
              - `UNABLE_TO_ALLOCATE_RESOURCE`: Discriminator for the *Vapi.Std.Errors.UnableToAllocateResource* type.
              - `UNAUTHENTICATED`: Discriminator for the *Vapi.Std.Errors.Unauthenticated* type.
              - `UNAUTHORIZED`: Discriminator for the *Vapi.Std.Errors.Unauthorized* type.
              - `UNEXPECTED_INPUT`: Discriminator for the *Vapi.Std.Errors.UnexpectedInput* type.
              - `UNSUPPORTED`: Discriminator for the *Vapi.Std.Errors.Unsupported* type.
              - `UNVERIFIED_PEER`: Discriminator for the *Vapi.Std.Errors.UnverifiedPeer* type.


            For more information see: *Vapi.Std.Errors.Error.Type*.

            This property was added in __vSphere API 6.7.2__.

            Can be missing or `null` for compatibility with preceding implementations.
      description: "The Vapi.Std.Errors.Error error describes theproperties common\
        \ to all standard errors. \n\n This error serves two purposes: \n   1. It\
        \ is the error that clients in many programming languages can catch to handle\
        \ all standard errors. Typically those clients will display one or more of\
        \ the localizable messages from *Vapi.Std.Errors.Error.messages* to a human.\
        \ \n   2. It is the error that operations can report when they need to report\
        \ some error, but the error doesn't fit into any other standard error, and\
        \ in fact the only reasonable way for a client to react to the error is to\
        \ display the message(s) to a human. \n "
      discriminator:
        propertyName: error_type
        mapping:
          ALREADY_EXISTS: "#/components/schemas/Vapi.Std.Errors.AlreadyExists"
          ALREADY_IN_DESIRED_STATE: "#/components/schemas/Vapi.Std.Errors.AlreadyInDesiredState"
          CANCELED: "#/components/schemas/Vapi.Std.Errors.Canceled"
          CONCURRENT_CHANGE: "#/components/schemas/Vapi.Std.Errors.ConcurrentChange"
          ERROR: "#/components/schemas/Vapi.Std.Errors.Error"
          FEATURE_IN_USE: "#/components/schemas/Vapi.Std.Errors.FeatureInUse"
          INTERNAL_SERVER_ERROR: "#/components/schemas/Vapi.Std.Errors.InternalServerError"
          INVALID_ARGUMENT: "#/components/schemas/Vapi.Std.Errors.InvalidArgument"
          INVALID_ELEMENT_CONFIGURATION: "#/components/schemas/Vapi.Std.Errors.InvalidElementConfiguration"
          INVALID_ELEMENT_TYPE: "#/components/schemas/Vapi.Std.Errors.InvalidElementType"
          INVALID_REQUEST: "#/components/schemas/Vapi.Std.Errors.InvalidRequest"
          NOT_ALLOWED_IN_CURRENT_STATE: "#/components/schemas/Vapi.Std.Errors.NotAllowedInCurrentState"
          NOT_FOUND: "#/components/schemas/Vapi.Std.Errors.NotFound"
          OPERATION_NOT_FOUND: "#/components/schemas/Vapi.Std.Errors.OperationNotFound"
          RESOURCE_BUSY: "#/components/schemas/Vapi.Std.Errors.ResourceBusy"
          RESOURCE_IN_USE: "#/components/schemas/Vapi.Std.Errors.ResourceInUse"
          RESOURCE_INACCESSIBLE: "#/components/schemas/Vapi.Std.Errors.ResourceInaccessible"
          SERVICE_UNAVAILABLE: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
          TIMED_OUT: "#/components/schemas/Vapi.Std.Errors.TimedOut"
          UNABLE_TO_ALLOCATE_RESOURCE: "#/components/schemas/Vapi.Std.Errors.UnableToAllocateResource"
          UNAUTHENTICATED: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
          UNAUTHORIZED: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
          UNEXPECTED_INPUT: "#/components/schemas/Vapi.Std.Errors.UnexpectedInput"
          UNSUPPORTED: "#/components/schemas/Vapi.Std.Errors.Unsupported"
          UNVERIFIED_PEER: "#/components/schemas/Vapi.Std.Errors.UnverifiedPeer"
    Vapi.Std.Errors.AlreadyInDesiredState:
      type: object
      description: "The Vapi.Std.Errors.AlreadyInDesiredState error indicates that\
        \ an attempt to change the state of a resource or service had no effect because\
        \ the resource or service is already in the desired state. \n\n Examples:\
        \ \n   - Trying to power on a virtual machine that is already powered on.\n\
        \ "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.ArgumentLocations:
      required:
      - primary
      - secondary
      type: object
      properties:
        primary:
          type: string
          description: String describing the location of the input that triggered
            the error.
        secondary:
          type: array
          description: List (possibly empty) of strings describing the locations of
            other inputs that caused the the primary input to trigger the error.
          items:
            type: string
      description: "The Vapi.Std.Errors.ArgumentLocations schema describes which part(s)\
        \ of the input to the operation caused the error. \n\n Some types of errors\
        \ are caused by the value of one of the inputs to the operation, possibly\
        \ due to an interaction with other inputs to the operation. \n\n This schema\
        \ is intended to be used as the payload to identify those inputs when the\
        \ operation reports errors like *Vapi.Std.Errors.InvalidArgument* or *Vapi.Std.Errors.NotFound*.\
        \ See *Vapi.Std.Errors.Error.data*."
    Vapi.Std.Errors.Canceled:
      type: object
      description: "The Vapi.Std.Errors.Canceled error indicates that the operation\
        \ canceled itself in response to an explicit request to do so. Operations\
        \ being \"canceled\" for other reasons (for example the client connection\
        \ was closed, a time out occured, or due to excessive resource consumption)\
        \ should not report this error. \n\n Examples: \n   - A user is monitoring\
        \ the progress of the operation in a GUI and sees that it is likely to take\
        \ longer than he is willing to wait and clicks the cancel button. \n   - A\
        \ user invokes the operation using a command-line tool and decides that she\
        \ didn't really want to invoke that operation, and presses CTRL-c. \n  \n\n\
        \ Counterexamples: \n   - The client's connection to the server was closed.\
        \ Reporting an error is pointless since the client will not receive the error\
        \ response because the connection has been closed. \n   - The request is taking\
        \ longer than some amount of time. The *Vapi.Std.Errors.TimedOut* error would\
        \ be reported if the time was specified as part of the input or is documented\
        \ in the API contract. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.ConcurrentChange:
      type: object
      description: "The Vapi.Std.Errors.ConcurrentChange error indicates that a data\
        \ structure, entity, or resource has been modified since some earlier point\
        \ in time. Typically this happens when the client is doing the *write* portion\
        \ of a read-modify-write sequence and indicates that it wants the server to\
        \ notify it if the data in the server has changed after it did the *read*,\
        \ so that it can avoid overwriting that change inadvertantly."
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.Error.Type:
      type: string
      description: |-
        Enumeration of all standard errors. Used as discriminator in protocols that have no standard means for transporting the error type, e.g. REST.

        Possible values:
          - `ERROR`: Discriminator for the *Vapi.Std.Errors.Error* type.
          - `ALREADY_EXISTS`: Discriminator for the *Vapi.Std.Errors.AlreadyExists* type.
          - `ALREADY_IN_DESIRED_STATE`: Discriminator for the *Vapi.Std.Errors.AlreadyInDesiredState* type.
          - `CANCELED`: Discriminator for the *Vapi.Std.Errors.Canceled* type.
          - `CONCURRENT_CHANGE`: Discriminator for the *Vapi.Std.Errors.ConcurrentChange* type.
          - `FEATURE_IN_USE`: Discriminator for the *Vapi.Std.Errors.FeatureInUse* type.
          - `INTERNAL_SERVER_ERROR`: Discriminator for the *Vapi.Std.Errors.InternalServerError* type.
          - `INVALID_ARGUMENT`: Discriminator for the *Vapi.Std.Errors.InvalidArgument* type.
          - `INVALID_ELEMENT_CONFIGURATION`: Discriminator for the *Vapi.Std.Errors.InvalidElementConfiguration* type.
          - `INVALID_ELEMENT_TYPE`: Discriminator for the *Vapi.Std.Errors.InvalidElementType* type.
          - `INVALID_REQUEST`: Discriminator for the *Vapi.Std.Errors.InvalidRequest* type.
          - `NOT_ALLOWED_IN_CURRENT_STATE`: Discriminator for the *Vapi.Std.Errors.NotAllowedInCurrentState* type.
          - `NOT_FOUND`: Discriminator for the *Vapi.Std.Errors.NotFound* type.
          - `OPERATION_NOT_FOUND`: Discriminator for the *Vapi.Std.Errors.OperationNotFound* type.
          - `RESOURCE_BUSY`: Discriminator for the *Vapi.Std.Errors.ResourceBusy* type.
          - `RESOURCE_IN_USE`: Discriminator for the *Vapi.Std.Errors.ResourceInUse* type.
          - `RESOURCE_INACCESSIBLE`: Discriminator for the *Vapi.Std.Errors.ResourceInaccessible* type.
          - `SERVICE_UNAVAILABLE`: Discriminator for the *Vapi.Std.Errors.ServiceUnavailable* type.
          - `TIMED_OUT`: Discriminator for the *Vapi.Std.Errors.TimedOut* type.
          - `UNABLE_TO_ALLOCATE_RESOURCE`: Discriminator for the *Vapi.Std.Errors.UnableToAllocateResource* type.
          - `UNAUTHENTICATED`: Discriminator for the *Vapi.Std.Errors.Unauthenticated* type.
          - `UNAUTHORIZED`: Discriminator for the *Vapi.Std.Errors.Unauthorized* type.
          - `UNEXPECTED_INPUT`: Discriminator for the *Vapi.Std.Errors.UnexpectedInput* type.
          - `UNSUPPORTED`: Discriminator for the *Vapi.Std.Errors.Unsupported* type.
          - `UNVERIFIED_PEER`: Discriminator for the *Vapi.Std.Errors.UnverifiedPeer* type.


        This enumeration was added in __vSphere API 6.7.2__.
      enum:
      - ERROR
      - ALREADY_EXISTS
      - ALREADY_IN_DESIRED_STATE
      - CANCELED
      - CONCURRENT_CHANGE
      - FEATURE_IN_USE
      - INTERNAL_SERVER_ERROR
      - INVALID_ARGUMENT
      - INVALID_ELEMENT_CONFIGURATION
      - INVALID_ELEMENT_TYPE
      - INVALID_REQUEST
      - NOT_ALLOWED_IN_CURRENT_STATE
      - NOT_FOUND
      - OPERATION_NOT_FOUND
      - RESOURCE_BUSY
      - RESOURCE_IN_USE
      - RESOURCE_INACCESSIBLE
      - SERVICE_UNAVAILABLE
      - TIMED_OUT
      - UNABLE_TO_ALLOCATE_RESOURCE
      - UNAUTHENTICATED
      - UNAUTHORIZED
      - UNEXPECTED_INPUT
      - UNSUPPORTED
      - UNVERIFIED_PEER
    Vapi.Std.Errors.FeatureInUse:
      type: object
      description: "The Vapi.Std.Errors.FeatureInUse error indicates that an action\
        \ cannot be completed because a feature is in use. \n\n Examples: \n   - Trying\
        \ to disable snapshots on a virtual machine which has a snapshot. \n   - Trying\
        \ to downgrade a license that has licensed features that are in use. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.FileLocations:
      required:
      - primary
      - secondary
      type: object
      properties:
        primary:
          type: string
          description: String identifying the file that triggered the error.
        secondary:
          type: array
          description: List (possibly empty) of strings identifying other files that
            caused the primary file to trigger the error.
          items:
            type: string
      description: "The Vapi.Std.Errors.FileLocations schema identifies the file(s)\
        \ that caused the operation to report the error. \n\n Some types of errors\
        \ are caused by a problem with one or more files. This schema is intended\
        \ to be used as the payload to identify those files when the operation reports\
        \ errors like *Vapi.Std.Errors.NotFound*. See *Vapi.Std.Errors.Error.data*."
    Vapi.Std.Errors.InternalServerError:
      type: object
      description: "The Vapi.Std.Errors.InternalServerError error indicates that the\
        \ server encounters an unexpected condition that prevented it from fulfilling\
        \ the request. \n\n This error is reported by the API infrastructure, so it\
        \ could occur in response to the invocation of any operation. \n\n Examples:\
        \ \n   - The operation returns a value whose type doesn't match the type type\
        \ the operation says it should return.\n   - The operation reports an error\
        \ that is not included in the list of errors the operation says that it can\
        \ report.\n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.InvalidArgument:
      type: object
      description: "The Vapi.Std.Errors.InvalidArgument error indicates that the values\
        \ received for one or more parameters are not acceptable. \n\n This error\
        \ is reported by the API infrastructure, so it could occur in response to\
        \ the invocation of any operation. It may also be reported as the result of\
        \ operation-specific validation. \n\n Examples: \n   - A parameter has a value\
        \ that is not of the expected type. \n   - A parameter has a value that is\
        \ not in the required range. \n   - A parameter has a value that is not one\
        \ of the specifically allowed strings. \n   - One property of a schema is\
        \ the tag for a tagged union, and has a specific value but another property\
        \ of the schema that is required to be specified when the tag has that value\
        \ is not specified, or another property of the schema that is required to\
        \ be unspecified when the tag has that value is specified. \n  \n\n Counterexamples:\
        \ \n   - Trying to create a new tag in tag category when a tag with the specified\
        \ name already exists the tag category. The *Vapi.Std.Errors.AlreadyExists*\
        \ error would be used instead. \n   - Invoke the operation to retrieve information\
        \ about a virtual machine, passing an id that does not identify an existing\
        \ virtual machine. The *Vapi.Std.Errors.NotFound* error would be used instead.\
        \ \n   - Attempt to put a virtual machine into a folder that can only contain\
        \ hosts. The *Vapi.Std.Errors.InvalidElementType* error would be used instead.\
        \ \n   - Attempt to attach a SCSI virtual disk to an IDE port. The *Vapi.Std.Errors.InvalidElementType*\
        \ error would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.InvalidElementConfiguration:
      type: object
      description: "The Vapi.Std.Errors.InvalidElementConfiguration error indicates\
        \ that an attempt to modify the configuration of an element or a group containing\
        \ the element failed due to the configuraton of the element. \n\n A typical\
        \ case is when the operation is am attempt to change the group membership\
        \ of the element fails, in which case a configuration change on the element\
        \ may allow the group membership change to succeed. \n\n Examples: \n   -\
        \ Attempt to move a host with a fault tolerant virtual machine out of a cluster\
        \ (i.e. make the host a standalone host). \n   - Attempt to remove a host\
        \ from a DRS cluster without putting the host into maintenance mode. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.InvalidElementType:
      type: object
      description: "The Vapi.Std.Errors.InvalidElementType error indicates that the\
        \ server was unable to fulfil the request because an element of a specific\
        \ type cannot be a member of particular group. \n\n This error could be reported,\
        \ for example, if an attempt is made to put an element into the wrong type\
        \ of container. \n\n Examples: \n   - Attempt to put a virtual machine into\
        \ a folder that can only contain hosts. \n   - Attempt to attach a SCSI virtual\
        \ disk to an IDE port. \n  Counterexamples: \n   - A parameter has a value\
        \ that is not of the expected type. The *Vapi.Std.Errors.InvalidArgument*\
        \ error would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.InvalidRequest:
      type: object
      description: "The Vapi.Std.Errors.InvalidRequest error indicates that the request\
        \ is malformed in such a way that the server is unable to process it. \n\n\
        \ Examples: \n   - The XML in a SOAP request is not well-formed so the server\
        \ cannot parse the request. \n   - The XML in a SOAP request is well-formed\
        \ but does not match the structure required by the SOAP specification. \n\
        \   - A JSON-RPC request is not valid JSON. \n   - The JSON sent in a JSON-RPC\
        \ request is not a valid JSON-RPC Request object. \n   - The Request object\
        \ from a JSON-RPC request does not match the structure required by the API\
        \ infrastructure. \n  \n\n Counterexamples: \n   - The parameter has a value\
        \ that is not with the required range. The *Vapi.Std.Errors.InvalidArgument*\
        \ error would be used instead. \n   - The name of the operation specified\
        \ in the request doesn't not match any known operation. The *Vapi.Std.Errors.NotFound*\
        \ error would be used instead. \n  \n\n Some transport protocols (for example\
        \ JSON-RPC) include their own mechanism for reporting these kinds of errors,\
        \ and the API infrastructure for a programming language may expose the errors\
        \ using a language specific mechanism, so this error might not be used."
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.NotAllowedInCurrentState:
      type: object
      description: "The Vapi.Std.Errors.NotAllowedInCurrentState error indicates that\
        \ the requested operation is not allowed with a resource or service in its\
        \ current state. This could be because the operation is performing a configuration\
        \ change that is not allowed in the current state or because operation itself\
        \ is not allowed in the current state. \n\n Examples: \n   - Trying to add\
        \ a virtual device that cannot be hot plugged to a running virtual machine.\
        \ \n   - Trying to upgrade the virtual hardware version for a suspended virtual\
        \ machine. \n   - Trying to power off, reset, or suspend a virtual machine\
        \ that is not powered on. \n  \n\n Counterexamples: \n   - Trying to power\
        \ off a virtual machine that is in the process of being powered on. The *Vapi.Std.Errors.ResourceBusy*\
        \ error would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.NotFound:
      type: object
      description: "The Vapi.Std.Errors.NotFound error indicates that a specified\
        \ element could not be found. \n\n Examples: \n   - Invoke the operation to\
        \ retrieve information about a virtual machine, passing an id that does not\
        \ identify an existing virtual machine. \n   - Invoke the operation to modify\
        \ the configuration of a virtual nic, passing an id that does not identify\
        \ an existing virtual nic in the specified virtual machine. \n   - Invoke\
        \ the operation to remove a vswitch, passing an id that does not identify\
        \ an existing vswitch. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.OperationNotFound:
      type: object
      description: "The Vapi.Std.Errors.OperationNotFound error indicates that the\
        \ operation specified in the request could not be found. \n\n Every API request\
        \ specifies a service identifier and an operation identifier along with the\
        \ parameters. If the API infrastructure is unable to find the requested resource\
        \ or operation it reports this error. \n\n This error can be reported by the\
        \ API infrastructure for any operation, but it is specific to the API infrastructure,\
        \ and should never be reported by the implementation of any operation. \n\n\
        \ Examples: \n   - A client provides an invalid service or operation identifier\
        \ when invoking the operation using a dynamic interface (for example REST).\
        \ \n   - A client invokes the operation from a resource, but that resource\
        \ has not been installed. \n  \n\n Counterexamples: \n   - A client invokes\
        \ a task scheduling operation, but provides an invalid service identifier\
        \ or operation identifier. The *Vapi.Std.Errors.NotFound* error would be used\
        \ instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.ResourceBusy:
      type: object
      description: "The Vapi.Std.Errors.ResourceBusy error indicates that the operation\
        \ could not be completed because a resource it needs is busy. \n\n Examples:\
        \ \n   - Trying to power off a virtual machine that is in the process of being\
        \ powered on. \n  \n\n Counterexamples: \n   - Trying to remove a VMFS datastore\
        \ when there is a virtual machine registered on any host attached to the datastore.\
        \ The *Vapi.Std.Errors.ResourceInUse* error would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.ResourceInUse:
      type: object
      description: "The Vapi.Std.Errors.ResourceInUse error indicates that the operation\
        \ could not be completed because a resource is in use. \n\n Examples: \n \
        \  - Trying to remove a VMFS datastore when the is a virtual machine registered\
        \ on any host attached to the datastore. \n   - Trying to add a virtual switch\
        \ if the physical network adapter being bridged is already in use. \n  \n\n\
        \ Counterexamples: \n   - Trying to power off a virtual machine that is in\
        \ the process of being powered on. The *Vapi.Std.Errors.ResourceBusy* error\
        \ would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.ResourceInaccessible:
      type: object
      description: "The Vapi.Std.Errors.ResourceInaccessible error indicates that\
        \ the operation could not be completed because an entity is not accessible.\
        \ \n\n Examples: \n   - Attempt to invoke some operation on a virtual machine\
        \ when the virtual machine's configuration file is not accessible (for example\
        \ due to a storage APD condition). \n  \n\n Counterexamples: \n   - Attempt\
        \ to invoke some operation when the server is too busy. The *Vapi.Std.Errors.ServiceUnavailable*\
        \ error would be used instead. \n   - Attempt to invoke some operation when\
        \ the server is undergoing maintenance. The *Vapi.Std.Errors.ServiceUnavailable*\
        \ error would be used instead. \n   - Some operation fails to contact VMware\
        \ Tools running inside the virtual machine. The *Vapi.Std.Errors.ServiceUnavailable*\
        \ error would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.ServiceUnavailable:
      type: object
      description: "The Vapi.Std.Errors.ServiceUnavailable error indicates that the\
        \ resource is unavailable. \n\n Examples: \n   - Attempt to invoke a operation\
        \ when the server is too busy. \n   - Attempt to invoke a operation when the\
        \ server is undergoing maintenance. \n   - An operation fails to contact VMware\
        \ Tools running inside the virtual machine. \n  \n\n Counterexamples: \n \
        \  - A client provides an invalid service or operation identifier when invoking\
        \ the operation using a dynamic interface (for example REST). The *Vapi.Std.Errors.OperationNotFound*\
        \ error would be used instead. \n   - A client invokes the operation from\
        \ the resource, but that resource has not been installed. The *Vapi.Std.Errors.OperationNotFound*\
        \ error would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.TimedOut:
      type: object
      description: "The Vapi.Std.Errors.TimedOut error indicates that the operation\
        \ did not complete within the allowed amount of time. The allowed amount of\
        \ time might be: \n   - provided by the client as an input parameter. \n \
        \  - a fixed limit of the resource implementation that is a documented part\
        \ of the contract of the resource. \n   - a configurable limit used by the\
        \ implementation of the resource. \n   - a dynamic limit computed by the implementation\
        \ of the resource. \n  The operation may or may not complete after the Vapi.Std.Errors.TimedOut\
        \ error was reported. \n\n Examples: \n   - The operation was unable to complete\
        \ within the timeout duration specified by a parameter of the operation. \n\
        \  \n\n Counterexamples: \n   - A server implementation that puts requests\
        \ into a queue before dispatching them might delete a request from the queue\
        \ if it doesn't get dispatched within *n* minutes. The *Vapi.Std.Errors.ServiceUnavailable*\
        \ error would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.TransientIndication:
      required:
      - is_transient
      type: object
      properties:
        is_transient:
          type: boolean
          description: Indicates that the error this schema is attached to is transient.
      description: "The Vapi.Std.Errors.TransientIndication schema indicates whether\
        \ or not the error is transient. \n\n Some types of errors are transient in\
        \ certain situtations and not transient in other situtations. This error payload\
        \ can be used to indicate to clients whether a particular error is transient.\
        \ See *Vapi.Std.Errors.Error.data*."
    Vapi.Std.Errors.UnableToAllocateResource:
      type: object
      description: "The Vapi.Std.Errors.UnableToAllocateResource error indicates that\
        \ the operation failed because it was unable to allocate or acquire a required\
        \ resource. \n\n Examples: \n   - Trying to power on a virtual machine when\
        \ there are not enough licenses to do so. \n   - Trying to power on a virtual\
        \ machine that would violate a resource usage policy. \n  \n\n Counterexamples:\
        \ \n   - Trying to power off a virtual machine that is in the process of being\
        \ powered on. A *Vapi.Std.Errors.ResourceBusy* error would be used instead.\
        \ \n   - Trying to remove a VMFS datastore when the is a virtual machine registered\
        \ on any host attached to the datastore. The *Vapi.Std.Errors.ResourceInUse*\
        \ error would be used instead. \n   - Trying to add a virtual switch if the\
        \ physical network adapter being bridged is already in use. The *Vapi.Std.Errors.ResourceInUse*\
        \ error would be used instead. \n   - Attempt to invoke some operation on\
        \ a virtual machine when the virtual machine's configuration file is not accessible\
        \ (for example due to a storage APD condition). The *Vapi.Std.Errors.ResourceInaccessible*\
        \ error would be used instead. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.Unauthenticated:
      type: object
      properties:
        challenge:
          type: string
          description: "Indicates the authentication challenges applicable to the\
            \ target API provider. It can be used by a client to discover the correct\
            \ authentication scheme to use. The exact syntax of the value is defined\
            \ by the specific provider, the protocol and authentication schemes used.\
            \ \n\n For example, a provider using REST may adhere to the WWW-Authenticate\
            \ HTTP header specification, RFC7235, section 4.1. In this case an example\
            \ challenge value may be: SIGN realm=\"27da1358-2ba4-11e9-b210-d663bd873d93\"\
            ,sts=\"http://vcenter/sso?vsphere.local\", Basic realm=\"vCenter\"\n\n\
            This property was added in __vSphere API 7.0.0.0__.\n\nThis property is\
            \ optional because it was added in a newer version than its parent node."
      description: "The Vapi.Std.Errors.Unauthenticated error indicates that the operation\
        \ requires authentication and the user is not authenticated. \n\n API requests\
        \ may include a security context containing user credentials. For example,\
        \ the user credentials could be a SAML token, a user name and password, or\
        \ the session identifier for a previously established session. \n\n Examples:\
        \ \n   - The SAML token in the request's security context has expired. \n\
        \   - The user name and password in the request's security context are invalid.\
        \ \n   - The session identifier in the request's security context identifies\
        \ a session that has expired. \n  Counterexamples: \n   -  The user is authenticated\
        \ but isn't authorized to perform the requested operation. The *Vapi.Std.Errors.Unauthorized*\
        \ error would be used instead. \n  \n\n For security reasons, the *Vapi.Std.Errors.Error.data*\
        \ property in this error is missing or `null`, and the *Vapi.Std.Errors.Error.messages*\
        \ property in this error does not disclose which part of the security context\
        \ is correct or incorrect. For example the messages would not disclose whether\
        \ a username or a password is valid or invalid, but only that a combination\
        \ of username and password is invalid."
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.Unauthorized:
      type: object
      properties:
        challenge:
          type: string
          description: "Indicates the authentication challenges applicable to the\
            \ target API provider. It can be used by a client to discover the correct\
            \ authentication scheme to use. The exact syntax of the value is defined\
            \ by the specific provider, the protocol and authentication schemes used.\
            \ \n\n For example, a provider using REST may adhere to the WWW-Authenticate\
            \ HTTP header specification, RFC7235, section 4.1. In this case an example\
            \ challenge value may be: SIGN realm=\"27da158-2ba4-11e9-b\",sts=\"http://vcenter/sso?vsphere.local\"\
            , Basic realm=\"vCenter\"\n\nThis property was added in __vSphere API\
            \ 9.1.0.0__.\n\nThis property is optional because it was added in a newer\
            \ version than its parent node."
      description: "The Vapi.Std.Errors.Unauthorized error indicates that the user\
        \ is not authorized to perform the operation. \n\n API requests may include\
        \ a security context containing user credentials. For example, the user credentials\
        \ could be a SAML token, a user name and password, or the session identifier\
        \ for a previously established session. Invoking the operation may require\
        \ that the user identified by those credentials has particular privileges\
        \ on the operation or on one or more resource identifiers passed to the operation.\
        \ \n\n Examples: \n   - The operation requires that the user have one or more\
        \ privileges on the operation, but the user identified by the credentials\
        \ in the security context does not have the required privileges. \n   - The\
        \ operation requires that the user have one or more privileges on a resource\
        \ identifier passed to the operation, but the user identified by the credentials\
        \ in the security context does not have the required privileges. \n  \n\n\
        \ \n\n Counterexamples: \n   - The SAML token in the request's security context\
        \ has expired. A *Vapi.Std.Errors.Unauthenticated* error would be used instead.\
        \ \n   - The user name and password in the request's security context are\
        \ invalid. The *Vapi.Std.Errors.Unauthenticated* error would be used instead.\
        \ \n   - The session identifier in the request's security context identifies\
        \ a session that has expired. The *Vapi.Std.Errors.Unauthenticated* error\
        \ would be used instead. \n  \n\n For security reasons, the *Vapi.Std.Errors.Error.data*\
        \ property in this error is missing or `null`, and the *Vapi.Std.Errors.Error.messages*\
        \ property in this error does not disclose why the user is not authorized\
        \ to perform the operation. For example the messages would not disclose which\
        \ privilege the user did not have or which resource identifier the user did\
        \ not have the required privilege to access. The API documentation should\
        \ indicate what privileges are required."
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.UnexpectedInput:
      type: object
      description: "The Vapi.Std.Errors.UnexpectedInput error indicates that the request\
        \ contained a parameter or property whose name is not known by the server.\
        \ \n\n Every operation expects parameters with known names. Some of those\
        \ parameters may be (or contain) schemas, and the operation expects those\
        \ schemas to contain properties with known names. If the operation receives\
        \ parameters or properties with names that is does not expect, this error\
        \ may be reported. \n\n This error can be reported by the API infrastructure\
        \ for any operation, but it is specific to the API infrastructure, and should\
        \ never be reported by the implementation of any operation. \n\n Examples:\
        \ \n   - A client using stubs generated from the interface specification for\
        \ version2 of a resource invokes the operation passing one or more parameters\
        \ that were added in version2, but they are communicating with a server that\
        \ only supports version1 of the resource. \n   - A client provides an unexpected\
        \ parameter or property name when invoking the operation using a dynamic interface\
        \ (for example REST). \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.Unsupported:
      type: object
      description: "The Vapi.Std.Errors.Unsupported error indicates that the operation\
        \ is not supported by the resource. \n\n Examples: \n   - Trying to hot-plug\
        \ a CPU when the current configuration of the VM does not support hot-plugging\
        \ of CPUs. \n   - Trying to change the memory size to a value that is not\
        \ within the acceptable guest memory bounds supported by the virtual machine's\
        \ host. \n "
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
    Vapi.Std.Errors.UnverifiedPeer:
      type: object
      description: "The Vapi.Std.Errors.UnverifiedPeer error indicates that an attempt\
        \ to connect to an unknown or not-yet-trusted endpoint failed because the\
        \ system was unable to verify the identity of the endpoint. \n\n Typically\
        \ the *Vapi.Std.Errors.Error.data* property of this error will contain information\
        \ that can be presented to a human to allow them to decide whether to trust\
        \ the endpoint. If they decide to trust the endpoint, the request can be resubmitted\
        \ with an indication that the endpoint should be trusted. \n\n Examples: \n\
        \   - The client provides an IP address or URL of an endpoint the system should\
        \ communicate with using an SSL connection, but the endpoint's SSL certificate\
        \ is self-signed, expired, or otherwise not trustworthy. \n   - The client\
        \ provides an IP address of a host the system should communicate with using\
        \ ssh, but ssh doesn't recognize the public key of the host\n  \n\n\n\nThis\
        \ schema was added in __vSphere API 6.7.1__."
      allOf:
      - $ref: "#/components/schemas/Vapi.Std.Errors.Error"
  securitySchemes:
    basic_auth:
      type: http
      scheme: basic
    api_key_auth:
      type: apiKey
      name: vmware-api-session-id
      in: header
    federated_identity_auth:
      type: http
      description: "If your vCenter Server is federated with an external identity\
        \ provider, please see: [VMware Identity Broker - vCenter Server Workflows](https://techdocs.broadcom.com/bin/gethidpage?ux-context-string=api-sdk_1&appid=vcf-9-0&language=&format=rendered)."
      scheme: bearer

