    Snapservice.Tasks.FilterSpec:
      type: object
      properties:
        tasks:
          uniqueItems: true
          type: array
          description: |-
            Identifiers of tasks that can match the filter.

            This property was added in __vSphere API 8.0.3.0__.

            This property may be missing or `null` if other filters are specified. If missing or `null` or empty, tasks with any identifier will match the filter.

            When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `com.vmware.snapservice.task`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `com.vmware.snapservice.task`.
          items:
            type: string
        operations:
          uniqueItems: true
          type: array
          description: "Identifiers of operations. Tasks created by these operations\
            \ match the filter (see *Snapservice.Tasks.CommonInfo.operation*). \n\n\
            \n\nThis property was added in __vSphere API 8.0.3.0__.\n\nIf missing\
            \ or `null` or empty, tasks associated with any operation will match the\
            \ filter.\n\nWhen clients pass a value of this schema as a parameter,\
            \ the property must contain identifiers for the resource type: `com.vmware.snapservice.operation`.\
            \ When operations return a value of this schema as a response, the property\
            \ will contain identifiers for the resource type: `com.vmware.snapservice.operation`."
          items:
            type: string
        services:
          uniqueItems: true
          type: array
          description: |-
            Identifiers of services. Tasks created by operations in these services match the filter (see *Snapservice.Tasks.CommonInfo.service*).

            This property was added in __vSphere API 8.0.3.0__.

            This property may be missing or `null` if tasks is specified. If this property is missing or `null` or empty, tasks for any service will match the filter.

            When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `com.vmware.snapservice.service`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `com.vmware.snapservice.service`.
          items:
            type: string
        status:
          uniqueItems: true
          type: array
          description: "Status that a task must have to match the filter (see *Snapservice.Tasks.CommonInfo.status*).\n\
            \nPossible values:\n  - `PENDING`: The operation is in pending state.\n\
            \  - `RUNNING`: The operation is in progress.\n  - `BLOCKED`: The operation\
            \ is blocked. \n\n The operation could be blocked if the system is waiting\
            \ for resources to be available to perform the operation.\n  - `SUCCEEDED`:\
            \ The operation completed successfully.\n  - `FAILED`: The operation failed.\n\
            \n\nFor more information see: *Snapservice.Tasks.Status*.\n\nThis property\
            \ was added in __vSphere API 8.0.3.0__.\n\nIf missing or `null` or empty,\
            \ tasks with any status match the filter."
          items:
            type: string
        users:
          uniqueItems: true
          type: array
          description: |-
            Users who must have initiated the operation for the associated task to match the filter (see *Snapservice.Tasks.CommonInfo.user*).

            This property was added in __vSphere API 8.0.3.0__.

            If missing or `null` or empty, tasks associated with operations initiated by any user match the filter.
          items:
            type: string
      description: "The Snapservice.Tasks.FilterSpec schema contains properties used\
        \ to filter the results when listing tasks (see *GET /snapservice/tasks*).\
        \ If multiple properties are specified, only tasks matching all of the properties\
        \ match the filter. \n\n Currently at least one of *Snapservice.Tasks.FilterSpec.tasks*\
        \ or *Snapservice.Tasks.FilterSpec.services* must be specified and not empty.\n\
        \nThis schema was added in __vSphere API 8.0.3.0__."
    Snapservice.Tasks.ListItem:
