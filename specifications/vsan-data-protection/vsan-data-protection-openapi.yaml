      - name: cluster
        in: path
        description: |-
          Identifier of the cluster.

          The parameter must be an identifier for the resource type: `ClusterComputeResource`.
        required: true
        schema:
          type: string
      - name: pgs
        in: query
        description: |-
          Identifiers of protection groups that can match the filter.

          This property was added in __vSphere API 8.0.3.0__.

          If missing or `null` or empty, protection groups with any identifier match the filter.

          When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `com.vmware.snapservice.protection_group`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `com.vmware.snapservice.protection_group`.
        required: false
        style: form
        explode: true
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
      - name: names
        in: query
        description: |-
          Names of protection groups that can match the filter.

          This property was added in __vSphere API 8.0.3.0__.

          If missing or `null` or empty, protection groups with any name match the filter.
        required: false
        style: form
        explode: true
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
      - name: states
        in: query
        description: "States of protection groups that can match the filter.\n\nPossible\
          \ values:\n  - `ACTIVE`: Active\n  - `PAUSED`: Paused\n  - `MARKED_FOR_DELETE`:\
          \ Marked for delete, \n\n Indicates that the PG is soft deleted but has\
          \ some PG snapshots and VM snapshots which are not yet expired. \n  - `DEMOTED`:\
          \ Indicates that the protection group is in a demoted state. While in this\
          \ state, there are no outgoing or incoming replications and local snapshots\
          \ (if any) are also stopped.\n  - `DORMANT`: \n\n Indicates that the PG\
          \ is in dormant state.  \n\n In this state, all local protection and outgoing\
          \ replications for the members are disabled. Members belonging to this protection\
          \ group will be replica members for active incoming replications. \n\nThis\
          \ constant was added in __vSphere API 9.0.0.0__.\n  - `RECOVERY`: Recovery\
          \ state. \n\n Indicates the protection group is in a recovery state. In\
          \ this state site recovery operations can be initiated in case of planned\
          \ migration and unplanned failover. \n\nThis constant was added in __vSphere\
          \ API 9.0.0.0__.\n  - `DORMANT_RANSOMWARE_RECOVERY`: Dormant ransomware\
          \ recovery state. \n\n Indicates the dormant protection group is undergoing\
          \ ransomware recovery. In this state protection group state can be transitioned\
          \ to DORMANT or DORMANT_PARTIAL_RECOVERY when end ransomware recovery operation\
          \ is initiated. \n\nThis constant was added in __vSphere API 9.1.0.0__.\n\
          \  - `DORMANT_PARTIAL_RECOVERY`: Dormant partial recovery state. \n\n Indicates\
          \ some of the virtual machines from dormant protection group have been recovered\
          \ on the recovery site. In this state protection group state can be transitioned\
          \ to DORMANT_RANSOMWARE_RECOVERY when start ransomware recovery operation\
          \ is initiated. \n\nThis constant was added in __vSphere API 9.1.0.0__.\n\
          \  - `ACTIVE_RANSOMWARE_RECOVERY`: Active ransomware recovery state. \n\n\
          \ Indicates that a ransomware recovery operation is being performed on the\
          \ recovery site for one or more virtual machines in the active protection\
          \ group. In this state protection group state can be transitioned to ACTIVE\
          \ or ACTIVE_PARTIAL_RECOVERY when end ransomware recovery operation is initiated.\
          \ \n\nThis constant was added in __vSphere API 9.1.0.0__.\n  - `ACTIVE_PARTIAL_RECOVERY`:\
          \ Active partial recovery state. \n\n Indicates some of the virtual machines\
          \ from active protection group have been recovered on the recovery site.\
          \ In this state protection group state can be transitioned to ACTIVE_RANSOMWARE_RECOVERY\
          \ when start ransomware recovery operation is initiated. \n\nThis constant\
          \ was added in __vSphere API 9.1.0.0__.\n  - `PAUSED_RANSOMWARE_RECOVERY`:\
          \ Paused ransomware recovery state. \n\n Indicates that a ransomware recovery\
          \ operation is being performed on the recovery site for one or more virtual\
          \ machines in the paused protection group In this state protection group\
          \ state can be transitioned to PAUSED or PAUSED_PARTIAL_RECOVERY when end\
          \ ransomware recovery operation is initiated. \n\nThis constant was added\
          \ in __vSphere API 9.1.0.0__.\n  - `PAUSED_PARTIAL_RECOVERY`: Paused partial\
          \ recovery state. \n\n Indicates some of the virtual machines from paused\
          \ protection group have been recovered on the recovery site. In this state\
          \ protection group state can be transitioned to PAUSED_RANSOMWARE_RECOVERY\
          \ when start ransomware recovery operation is initiated. \n\nThis constant\
          \ was added in __vSphere API 9.1.0.0__.\n\n\nFor more information see: *Snapservice.ProtectionGroupStatus*.\n\
          \nThis property was added in __vSphere API 8.0.3.0__.\n\nIf missing or `null`\
          \ or empty, protection groups with any state match the filter."
        required: false
        style: form
        explode: true
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
      - name: vms
        in: query
        description: |-
          Identifiers of the virtual machines which belong to the protection groups that can match the filter.

          This property was added in __vSphere API 8.0.3.0__.

          If missing or `null` or empty, protection groups with any virtual machines match the filter.

          When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `com.vmware.snapservice.protection_group`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `com.vmware.snapservice.protection_group`.
        required: false
        style: form
        explode: true
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
      - name: cluster_pairs
        in: query
        description: |-
          Identifiers of the cluster pairs configured for protection groups that can match the filter.

          This property was added in __vSphere API 8.0.3.0__.

          If missing or `null` or empty, protection groups with any or no cluster pairs match the filter.

          When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `com.vmware.snapservice.protection_group`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `com.vmware.snapservice.protection_group`.
        required: false
        style: form
        explode: true
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
      responses:
        "400":
          description: If validation of the filter fails.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.InvalidArgument"
