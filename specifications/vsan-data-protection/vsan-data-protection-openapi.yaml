openapi: 3.0.3
info:
  title: Snapshot Appliance API
  version: 9.1.0.0
servers:
- url: "https://{host}/api"
  variables:
    host:
      default: localhost
tags:
- name: Snapservice.ClusterPairs
  description: |-
    The Snapservice.ClusterPairs resource provides operations for managing cluster pairs.

    This resource was added in __vSphere API 9.0.0.0__.
- name: Snapservice.ProtectionGroups
  description: |-
    The Snapservice.ProtectionGroups resource provides operations for managing protection groups.

    This resource was added in __vSphere API 9.1.0.0__.
- name: Snapservice.Sessions
  description: "The Snapservice.Sessions resource allows API clients to manage snapservice\
    \ session tokens including creating, deleting and obtaining information about\
    \ sessions. \n\n\n\nThis resource was added in __vSphere API 9.0.0.0__."
- name: Snapservice.Sites
  description: |-
    The Snapservice.Sites resource provides operations for managing site pairing between local and remote sites.

    This resource was added in __vSphere API 9.0.0.0__.
- name: Snapservice.Tasks
  description: |-
    The Snapservice.Tasks resource provides operations for managing the tasks related to long running operations.

    This resource was added in __vSphere API 8.0.3.0__.
- name: Snapservice.Clusters.ProtectionGroups
  description: |-
    The Snapservice.Clusters.ProtectionGroups resource provides operations for managing protection groups created for a cluster.

    This resource was added in __vSphere API 8.0.3.0__.
- name: Snapservice.Clusters.VirtualMachines
  description: |-
    The Snapservice.Clusters.VirtualMachines resource provides operations to manage virtual machines.

    This resource was added in __vSphere API 8.0.3.0__.
- name: Snapservice.Clusters.ProtectionGroups.Snapshots
  description: |-
    The Snapservice.Clusters.ProtectionGroups.Snapshots resource provides operations to manage snapshots for a protection group.

    This resource was added in __vSphere API 8.0.3.0__.
- name: Snapservice.Clusters.VirtualMachines.Snapshots
  description: |-
    The Snapservice.Clusters.VirtualMachines.Snapshots resource provides operations to manage snapshots for a protection group.

    This resource was added in __vSphere API 8.0.3.0__.
- name: Snapservice.Info.About
  description: |-
    The Snapservice.Info.About resource provides operations that fetch details about Snapshot service.

    This resource was added in __vSphere API 8.0.3.0__.
- name: Snapservice.ProtectionGroups.Capabilities
  description: |-
    The Snapservice.ProtectionGroups.Capabilities resource provides operations related to pgs' capabilities.

    This resource was added in __vSphere API 9.1.0.0__.
- name: Snapservice.Reports.Clusters.ProtectionGroups
  description: |-
    The Snapservice.Reports.Clusters.ProtectionGroups provides operations for protection groups report.

    This resource was added in __vSphere API 9.0.0.0__.
- name: Snapservice.Reports.Clusters.VirtualMachines
  description: |-
    The Snapservice.Reports.Clusters.VirtualMachines provides operations for virtual machines report.

    This resource was added in __vSphere API 9.0.0.0__.
- name: Snapservice.Reports.Clusters.ProtectionGroups.Snapshots
  description: |-
    The Snapservice.Reports.Clusters.ProtectionGroups.Snapshots provides operations for protection group snapshot reports.

    This resource was added in __vSphere API 9.0.0.0__.
- name: Snapservice.Reports.Clusters.VirtualMachines.Snapshots
  description: |-
    The Snapservice.Reports.Clusters.VirtualMachines.Snapshots provides operations for virtual machine snapshot reports.

    This resource was added in __vSphere API 9.0.0.0__.
- name: Snapservice.Sites.Capabilities
  description: |-
    The Snapservice.Sites.Capabilities resource provides operations related to sites' capabilities.

    This resource was added in __vSphere API 9.1.0.0__.
- name: Snapservice.Sites.Clusters
  description: |-
    The Snapservice.Sites.Clusters resource provides operations for managing clusters in a site

    This resource was added in __vSphere API 9.0.0.0__.
- name: Snapservice.Sites.Datastores
  description: |-
    The Snapservice.Sites.Datastores resource provides operations related to datastores in a site.

    This resource was added in __vSphere API 9.1.0.0__.
- name: Snapservice.Sites.Licenses
  description: |-
    The Snapservice.Sites.Licenses resource provides operations for managing the licenses for a site.

    This resource was added in __vSphere API 9.0.0.0__.
- name: Snapservice.Sites.Clusters.Capabilities
  description: |-
    The Snapservice.Sites.Clusters.Capabilities resource provides operations related to cluster's capabilities of a site.

    This resource was added in __vSphere API 9.1.0.0__.
- name: Snapservice.Sites.Datastores.Capabilities
  description: |-
    The Snapservice.Sites.Datastores.Capabilities resource provides operations related to datastore's capabilities of a site.

    This resource was added in __vSphere API 9.1.0.0__.
- name: Snapservice.VirtualMachines.ProtectionConfiguration
  description: |-
    The Snapservice.VirtualMachines.ProtectionConfiguration resource provides operations to manage virtual machine protection configuration.

    This resource was added in __vSphere API 9.1.0.0__.
- name: Snapservice.VirtualMachines.Snapshots
  description: |-
    The Snapservice.VirtualMachines.Snapshots provides operations for virtual machine snapshots for virtual machines.

    This resource was added in __vSphere API 9.1.0.0__.
paths:
  /snapservice/cluster-pairs:
    get:
      tags:
      - Snapservice.ClusterPairs
      description: "List the cluster pairs.\n\nThis operation was added in __vSphere\
        \ API 9.0.0.0__.\n\nReturns an authorization error if you do not have all\
        \ of the privileges described as follows: \n   -  Operation execution requires\
        \ `VsanDP.Replication.com.vmware.vsan.snapshotservice.Site.View`. \n"
      operationId: Snapservice.ClusterPairs_list
      parameters:
      - name: cluster_pairs
        in: query
        description: |-
          Identifiers of clusters pairs that can match the filter.

          This property was added in __vSphere API 9.0.0.0__.

          If missing or `null` or empty, cluster pairs with any identifier match the filter.

          When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `com.vmware.snapservice.cluster_pair`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `com.vmware.snapservice.cluster_pair`.
        required: false
        style: form
        explode: true
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
      - name: local_clusters
        in: query
        description: |-
          Identifier of the local clusters that can match the filter. Only cluster pairs with the specified local cluster would be returned.

          This property was added in __vSphere API 9.0.0.0__.

          If missing or `null` or empty, clusters with any identifier match the filter.

          When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `ClusterComputeResource`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `ClusterComputeResource`.
        required: false
        style: form
        explode: true
        schema:
          uniqueItems: true
          type: array
          items:
            type: string
      responses:
        "400":
          description: If validation of the filter fails.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.InvalidArgument"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: if the system is unable to communicate with a service to complete
            the request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "200":
          description: Information about the cluster pairs matching the *Snapservice.ClusterPairs.FilterSpec*.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapservice.ClusterPairs.ListResult"
      security:
      - api_key_auth: []
  /snapservice/cluster-pairs/{cp}:
    get:
      tags:
      - Snapservice.ClusterPairs
      description: "Get the detailed information regarding the specified cluster pair.\n\
        \nThis operation was added in __vSphere API 9.0.0.0__.\n\nReturns an authorization\
        \ error if you do not have all of the privileges described as follows: \n\
        \   -  Operation execution requires `VsanDP.Replication.com.vmware.vsan.snapshotservice.Site.View`.\
        \ \n"
      operationId: Snapservice.ClusterPairs_get
      parameters:
      - name: cp
        in: path
        description: |-
          Identifier of the cluster pair.

          The parameter must be an identifier for the resource type: `com.vmware.snapservice.cluster_pair`.
        required: true
        schema:
          type: string
      responses:
        "400":
          description: |-
            ***Vapi.Std.Errors.InvalidArgument*** If cp format is not valid.

            ***Vapi.Std.Errors.Unsupported*** If the API is not supported.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "404":
          description: If the cp is not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.NotFound"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: if the system is unable to communicate with a service to complete
            the request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "200":
          description: Information about the specified cluster pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapservice.ClusterPairs.Info"
      security:
      - api_key_auth: []
  /snapservice/cluster-pairs?action=create-precheck:
    post:
      tags:
      - Snapservice.ClusterPairs
      description: "Precheck validation for creating a new cluster pair.\n\nThis operation\
        \ was added in __vSphere API 9.0.0.0__.\n\nReturns an authorization error\
        \ if you do not have all of the privileges described as follows: \n   -  Operation\
        \ execution requires `VsanDP.Replication.com.vmware.vsan.snapshotservice.Site.Manage`.\
        \ \n"
      operationId: Snapservice.ClusterPairs_createPrecheck
      requestBody:
        description: Precheck specification for creating the cluster pair.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Snapservice.ClusterPairs.CreateSpec"
        required: true
      responses:
        "400":
          description: |-
            ***Vapi.Std.Errors.InvalidArgument*** If validation of the spec fails.

            ***Vapi.Std.Errors.AlreadyExists*** If caller tries to create already existing cluster pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: if the system is unable to communicate with a service to complete
            the request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "200":
          description: Precheck result details with validation and status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapservice.PrecheckResult"
      security:
      - api_key_auth: []
  /snapservice/cluster-pairs?vmw-task=true:
    post:
      tags:
      - Snapservice.ClusterPairs
      description: "Create a new cluster pair.\n\nThis operation was added in __vSphere\
        \ API 9.0.0.0__.\n\nReturns an authorization error if you do not have all\
        \ of the privileges described as follows: \n   -  Operation execution requires\
        \ `VsanDP.Replication.com.vmware.vsan.snapshotservice.Site.Manage`. \n"
      operationId: Snapservice.ClusterPairs_create$Task
      requestBody:
        description: Specification for creating the cluster pair.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Snapservice.ClusterPairs.CreateSpec"
        required: true
      responses:
        "400":
          description: |-
            ***Vapi.Std.Errors.InvalidArgument*** If validation of the spec fails.

            ***Vapi.Std.Errors.Unsupported*** If the operation is attempted without a site pair.

            ***Vapi.Std.Errors.AlreadyExists*** If caller tries to create already existing cluster pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: if the system is unable to communicate with a service to complete
            the request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "202":
          description: |-
            Identifier of the cluster pair.

            The response will be an identifier for the resource type: `com.vmware.snapservice.cluster_pair`.
          content:
            application/json:
              schema:
                type: string
      security:
      - api_key_auth: []
  /snapservice/cluster-pairs/{cp}?vmw-task=true:
    delete:
      tags:
      - Snapservice.ClusterPairs
      description: "Delete the specified cluster-pair.\n\nThis operation was added\
        \ in __vSphere API 9.0.0.0__.\n\nReturns an authorization error if you do\
        \ not have all of the privileges described as follows: \n   -  Operation execution\
        \ requires `VsanDP.Replication.com.vmware.vsan.snapshotservice.Site.Manage`.\
        \ \n"
      operationId: Snapservice.ClusterPairs_delete$Task
      parameters:
      - name: cp
        in: path
        description: |-
          ClusterPair identifier.

          The parameter must be an identifier for the resource type: `com.vmware.snapservice.cluster_pair`.
        required: true
        schema:
          type: string
      responses:
        "400":
          description: If caller tries to delete the cluster-pair with active protection
            groups.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.NotAllowedInCurrentState"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "404":
          description: If the cp is not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.NotFound"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: If the system is unable to communicate with a service to complete
            the request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "202":
          description: Success!
          content:
            application/json:
              schema:
                type: string
      security:
      - api_key_auth: []
  /snapservice/cluster-pairs?action=create-precheck&vmw-task=true:
    post:
      tags:
      - Snapservice.ClusterPairs
      description: "Precheck validation for creating a new cluster pair.\n\nThis operation\
        \ was added in __vSphere API 9.0.0.0__.\n\nReturns an authorization error\
        \ if you do not have all of the privileges described as follows: \n   -  Operation\
        \ execution requires `VsanDP.Replication.com.vmware.vsan.snapshotservice.Site.Manage`.\
        \ \n"
      operationId: Snapservice.ClusterPairs_createPrecheck$Task
      requestBody:
        description: Precheck specification for creating the cluster pair.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Snapservice.ClusterPairs.CreateSpec"
        required: true
      responses:
        "400":
          description: |-
            ***Vapi.Std.Errors.InvalidArgument*** If validation of the spec fails.

            ***Vapi.Std.Errors.AlreadyExists*** If caller tries to create already existing cluster pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: if the system is unable to communicate with a service to complete
            the request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "202":
          description: Precheck result details with validation and status.
          content:
            application/json:
              schema:
                type: string
      security:
      - api_key_auth: []
  /snapservice/protection-groups?action=compute-members:
    post:
      tags:
      - Snapservice.ProtectionGroups
      description: "Computes the member entities of a protection group based on the\
        \ specification\n\nThis operation was added in __vSphere API 9.1.0.0__.\n\n\
        Returns an authorization error if you do not have all of the privileges described\
        \ as follows: \n   -  Operation execution requires `System.Read`. \n  -  The\
        \ resource `ClusterComputeResource` referenced by the property *Snapservice.ProtectionGroups.ComputeMembersSpec.cluster_id*\
        \ requires `System.Read`. \n"
      operationId: Snapservice.ProtectionGroups_computeMembers
      requestBody:
        description: Specification used to preview the members of a create of update
          protection group request.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Snapservice.ProtectionGroups.ComputeMembersSpec"
        required: true
      responses:
        "400":
          description: If validation of the spec fails. Eg. If spec.createSpec and
            spec.updateSpec are provided together; spec.createSpec and spec.pgID are
            provided together; spec.updateSpec is provided but no spec.gpID; spec.clusterId
            or spec.pgId are not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.InvalidArgument"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: If the service is not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "200":
          description: List of virtual machines that would be included/excluded when
            create/update a protection group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapservice.MemberEntities"
      security:
      - api_key_auth: []
  /snapservice/protection-groups/{pg}?action=start-ransomware-recovery&vmw-task=true:
    post:
      tags:
      - Snapservice.ProtectionGroups
      description: "Start Ransomware Recovery on the specified protection group. This\
        \ operation is called in recovery site and when protection group is in DORMANT\
        \ state. It sets a protection group into DORMANT_RANSOMWARE_RECOVERY state.\
        \ When Ransomware Recovery is started, SnapService will do the following:\
        \ Pause snapshot expiry.\n\nThis operation was added in __vSphere API 9.1.0.0__.\n\
        \nReturns an authorization error if you do not have all of the privileges\
        \ described as follows: \n   -  Operation execution requires `Host.Config.Storage`.\
        \ \n"
      operationId: Snapservice.ProtectionGroups_startRansomwareRecovery$Task
      parameters:
      - name: pg
        in: path
        description: |-
          Identifier of the protection group.

          The parameter must be an identifier for the resource type: `com.vmware.snapservice.protection_group`.
        required: true
        schema:
          type: string
      responses:
        "400":
          description: |-
            ***Vapi.Std.Errors.AlreadyInDesiredState*** If the protection group is already in desired state.

            ***Vapi.Std.Errors.NotAllowedInCurrentState*** If the specified protection group is not in a valid state for the transition.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "404":
          description: If there is no protection group associated with pg in the system.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.NotFound"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: If the service is not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "202":
          description: Success!
          content:
            application/json:
              schema:
                type: string
      security:
      - api_key_auth: []
  /snapservice/protection-groups/{pg}?action=end-ransomware-recovery&vmw-task=true:
    post:
      tags:
      - Snapservice.ProtectionGroups
      description: "End Ransomware Recovery on the specified protection group. This\
        \ operation is called in recovery site and when protection group is in DORMANT_RANSOMWARE_RECOVERY\
        \ state. It sets a protection group back into original state before this operation\
        \ was called. When the Ransomware Recovery is ended, SnapService will to do\
        \ the following: Unpause snapshot expiry.\n\nThis operation was added in __vSphere\
        \ API 9.1.0.0__.\n\nReturns an authorization error if you do not have all\
        \ of the privileges described as follows: \n   -  Operation execution requires\
        \ `Host.Config.Storage`. \n"
      operationId: Snapservice.ProtectionGroups_endRansomwareRecovery$Task
      parameters:
      - name: pg
        in: path
        description: |-
          Identifier of the protection group.

          The parameter must be an identifier for the resource type: `com.vmware.snapservice.protection_group`.
        required: true
        schema:
          type: string
      responses:
        "400":
          description: |-
            ***Vapi.Std.Errors.AlreadyInDesiredState*** If the protection group is already in desired state.

            ***Vapi.Std.Errors.NotAllowedInCurrentState*** If the specified protection group is not in a valid state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "401":
          description: If the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthenticated"
        "403":
          description: If the caller is not authorized to perform the operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Unauthorized"
        "404":
          description: If there is no protection group associated with pg in the system.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.NotFound"
        "500":
          description: If there is unknown internal error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.Error"
        "503":
          description: If the service is not available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vapi.Std.Errors.ServiceUnavailable"
        "202":
