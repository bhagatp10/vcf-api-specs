components:
  schemas:
    Snapservice.LogicalOperator:
      type: string
      description: |-
        The Snapservice.LogicalOperator enumerated type contains the strategies for for joining rule sets.

        Possible values:
          - `AND`: All rule sets should satisfy the criteria.
          - `OR`: Any rule set can satisfy the criteria.


        This enumeration was added in __vSphere API 9.1.0.0__.
      enum:
      - AND
      - OR
    Snapservice.PrecheckStatus:
      type: string
      description: |-
        The Snapservice.PrecheckStatus enumerated type contains the validation status for a given precheck.

        Possible values:
          - `OK`: Precheck validation succeeded.
          - `WARNING`: Precheck validation warning.
          - `ERROR`: Precheck validation error.


        This enumeration was added in __vSphere API 9.0.0.0__.
      enum:
      - OK
      - WARNING
      - ERROR
    Snapservice.TimeUnit:
      type: string
      description: |-
        The Snapservice.TimeUnit enumerated type contains the supported values for how often snapshots are taken.

        Possible values:
          - `MINUTE`: Minutes.
          - `HOUR`: Hours.
          - `DAY`: Day.
          - `WEEK`: Weeks.
          - `MONTH`: Months.
          - `YEAR`: Years.

        This constant was added in __vSphere API 9.1.0.0__.


        This enumeration was added in __vSphere API 8.0.3.0__.
      enum:
      - MINUTE
      - HOUR
      - DAY
      - WEEK
      - MONTH
      - YEAR
    Snapservice.TimeFrequency:
      type: string
      description: |-
        The Snapservice.TimeFrequency enumerated type contains the supported values for frequency to be used for snapshot retention.

        Possible values:
          - `HOURLY`: Keep hourly snapshots.
          - `DAILY`: Keep daily snapshots.
          - `WEEKLY`: Keep weekly snapshots.
          - `MONTHLY`: Keep monthly snapshots.
          - `YEARLY`: Keep yearly snapshots.


        This enumeration was added in __vSphere API 8.0.3.0__.
      enum:
      - HOURLY
      - DAILY
      - WEEKLY
      - MONTHLY
      - YEARLY
    Snapservice.DayOfWeek:
      type: string
      description: |-
        The Snapservice.DayOfWeek enumerated type contains the supported values for the day of week at which a replica snapshot is selected for long term retention.

        Possible values:
          - `SUNDAY`: Sunday
          - `MONDAY`: Monday
          - `TUESDAY`: Tuesday
          - `WEDNESDAY`: Wednesday
          - `THURSDAY`: Thursday
          - `FRIDAY`: Friday
          - `SATURDAY`: Saturday


        This enumeration was added in __vSphere API 9.1.0.0__.
      enum:
      - SUNDAY
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
    Snapservice.ProtectionGroupStatus:
      type: string
      description: "The Snapservice.ProtectionGroupStatus enumerated type contains\
        \ the different states for the protection group.\n\nPossible values:\n  -\
        \ `ACTIVE`: Active\n  - `PAUSED`: Paused\n  - `MARKED_FOR_DELETE`: Marked\
        \ for delete, \n\n Indicates that the PG is soft deleted but has some PG snapshots\
        \ and VM snapshots which are not yet expired. \n  - `DEMOTED`: Indicates that\
        \ the protection group is in a demoted state. While in this state, there are\
        \ no outgoing or incoming replications and local snapshots (if any) are also\
        \ stopped.\n  - `DORMANT`: \n\n Indicates that the PG is in dormant state.\
        \  \n\n In this state, all local protection and outgoing replications for\
        \ the members are disabled. Members belonging to this protection group will\
        \ be replica members for active incoming replications. \n\nThis constant was\
        \ added in __vSphere API 9.0.0.0__.\n  - `RECOVERY`: Recovery state. \n\n\
        \ Indicates the protection group is in a recovery state. In this state site\
        \ recovery operations can be initiated in case of planned migration and unplanned\
        \ failover. \n\nThis constant was added in __vSphere API 9.0.0.0__.\n  - `DORMANT_RANSOMWARE_RECOVERY`:\
        \ Dormant ransomware recovery state. \n\n Indicates the dormant protection\
        \ group is undergoing ransomware recovery. In this state protection group\
        \ state can be transitioned to DORMANT or DORMANT_PARTIAL_RECOVERY when end\
        \ ransomware recovery operation is initiated. \n\nThis constant was added\
        \ in __vSphere API 9.1.0.0__.\n  - `DORMANT_PARTIAL_RECOVERY`: Dormant partial\
        \ recovery state. \n\n Indicates some of the virtual machines from dormant\
        \ protection group have been recovered on the recovery site. In this state\
        \ protection group state can be transitioned to DORMANT_RANSOMWARE_RECOVERY\
        \ when start ransomware recovery operation is initiated. \n\nThis constant\
        \ was added in __vSphere API 9.1.0.0__.\n  - `ACTIVE_RANSOMWARE_RECOVERY`:\
        \ Active ransomware recovery state. \n\n Indicates that a ransomware recovery\
        \ operation is being performed on the recovery site for one or more virtual\
        \ machines in the active protection group. In this state protection group\
        \ state can be transitioned to ACTIVE or ACTIVE_PARTIAL_RECOVERY when end\
        \ ransomware recovery operation is initiated. \n\nThis constant was added\
        \ in __vSphere API 9.1.0.0__.\n  - `ACTIVE_PARTIAL_RECOVERY`: Active partial\
        \ recovery state. \n\n Indicates some of the virtual machines from active\
        \ protection group have been recovered on the recovery site. In this state\
        \ protection group state can be transitioned to ACTIVE_RANSOMWARE_RECOVERY\
        \ when start ransomware recovery operation is initiated. \n\nThis constant\
        \ was added in __vSphere API 9.1.0.0__.\n  - `PAUSED_RANSOMWARE_RECOVERY`:\
        \ Paused ransomware recovery state. \n\n Indicates that a ransomware recovery\
        \ operation is being performed on the recovery site for one or more virtual\
        \ machines in the paused protection group In this state protection group state\
        \ can be transitioned to PAUSED or PAUSED_PARTIAL_RECOVERY when end ransomware\
        \ recovery operation is initiated. \n\nThis constant was added in __vSphere\
        \ API 9.1.0.0__.\n  - `PAUSED_PARTIAL_RECOVERY`: Paused partial recovery state.\
        \ \n\n Indicates some of the virtual machines from paused protection group\
        \ have been recovered on the recovery site. In this state protection group\
        \ state can be transitioned to PAUSED_RANSOMWARE_RECOVERY when start ransomware\
        \ recovery operation is initiated. \n\nThis constant was added in __vSphere\
        \ API 9.1.0.0__.\n\n\nThis enumeration was added in __vSphere API 8.0.3.0__."
      enum:
      - ACTIVE
      - PAUSED
      - MARKED_FOR_DELETE
      - DEMOTED
      - DORMANT
      - RECOVERY
      - DORMANT_RANSOMWARE_RECOVERY
      - DORMANT_PARTIAL_RECOVERY
      - ACTIVE_RANSOMWARE_RECOVERY
      - ACTIVE_PARTIAL_RECOVERY
      - PAUSED_RANSOMWARE_RECOVERY
      - PAUSED_PARTIAL_RECOVERY
    Snapservice.MembershipChangeType:
      type: string
      description: |-
        The change type of a virtual machine. Value ADD and EXISTING mean the virtual machine will be included in protection group; REMOVE and EXCLUDE mean they will not in the protection group.

        Possible values:
          - `ADD`: The virtual machine is added to protection group.
          - `REMOVE`: The virtual machine is removed from protection group.
          - `EXCLUDE`: The virtual machine is excluded from protection group by filter conditions.
          - `EXISTING`: The virtual machine already exists in protection group, and keeps existing.


        This enumeration was added in __vSphere API 9.1.0.0__.
      enum:
      - ADD
      - REMOVE
      - EXCLUDE
      - EXISTING
    Snapservice.PrecheckResultItem:
      required:
      - desc
      - status
      - type
      type: object
      properties:
        type:
          type: string
          description: |-
            Identifier of precheck performed. TODO: Add enum with each type

            This property was added in __vSphere API 9.0.0.0__.
        desc:
          description: |-
            Details about the precheck validation.

            This property was added in __vSphere API 9.0.0.0__.
          allOf:
          - $ref: "#/components/schemas/Vapi.Std.LocalizableMessage"
        status:
          type: string
          description: |-
            Status for precheck validation performed.

            Possible values:
              - `OK`: Precheck validation succeeded.
              - `WARNING`: Precheck validation warning.
              - `ERROR`: Precheck validation error.


            For more information see: *Snapservice.PrecheckStatus*.

            This property was added in __vSphere API 9.0.0.0__.
        errors:
          type: array
          description: |-
            List of localized errors associated with the precheck.

            This property was added in __vSphere API 9.0.0.0__.

            This property is optional and it is only relevant when the value of status is one of *Snapservice.PrecheckStatus.WARNING* or *Snapservice.PrecheckStatus.ERROR*.
          items:
            $ref: "#/components/schemas/Snapservice.Reason"
      description: |-
        The Snapservice.PrecheckResultItem schema contains properties that provide details about individual precheck validation result.

        This schema was added in __vSphere API 9.0.0.0__.
    Snapservice.PrecheckResult:
      required:
      - prechecks
      type: object
      properties:
        prechecks:
          type: array
          description: |-
            List of precheck with details.

            This property was added in __vSphere API 9.0.0.0__.
          items:
            $ref: "#/components/schemas/Snapservice.PrecheckResultItem"
      description: |-
        The Snapservice.PrecheckResult schema contains properties that provide details about all the prechecks performed.

        This schema was added in __vSphere API 9.0.0.0__.
    Snapservice.TargetEntities:
      type: object
      properties:
        vm_name_patterns:
          type: array
          description: "One or more match patterns for virtual machines to be protected.\
            \ \n\n Uses standard POSIX Shell globbing pattern. See also, the POSIX\
            \ Shell language: http://pubs.opengroup.org/onlinepubs/009695399/utilities/xcu_chap02.html#tag_02_13_01\n\
            \nThis property was added in __vSphere API 8.0.3.0__.\n\nIf missing or\
            \ `null`, *Snapservice.TargetEntities.vms* must be specified."
          items:
            type: string
        vms:
          uniqueItems: true
          type: array
          description: |-
            List of virtual machines to be protected.

            This property was added in __vSphere API 8.0.3.0__.

            If missing or `null`, the virtual machines to be protected will be determined based on the *Snapservice.TargetEntities.vm_name_patterns*.

            When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `VirtualMachine`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `VirtualMachine`.
          items:
            type: string
        tag_rules:
          type: array
          description: |-
            Tag rules to select the virtual machines for protection. All virtual machines that match the specified tag selection criteria will be protected.

            This property was added in __vSphere API 9.1.0.0__.

            If missing or `null`, *Snapservice.TargetEntities.vms* or *Snapservice.TargetEntities.vm_name_patterns* must be specified.
          items:
            $ref: "#/components/schemas/Snapservice.TagRule"
      description: |-
        The Snapservice.TargetEntities schema contains properties specifying the target entities to be protected. The initial release will only support virtual machines.

        This schema was added in __vSphere API 8.0.3.0__.
    Snapservice.SnapshotSchedule:
      required:
      - interval
      - unit
      type: object
      properties:
        unit:
          type: string
          description: |-
            Units for the interval.

            Possible values:
              - `MINUTE`: Minutes.
              - `HOUR`: Hours.
              - `DAY`: Day.
              - `WEEK`: Weeks.
              - `MONTH`: Months.
              - `YEAR`: Years.

            This constant was added in __vSphere API 9.1.0.0__.


            For more information see: *Snapservice.TimeUnit*.

            This property was added in __vSphere API 8.0.3.0__.
        interval:
          type: integer
          description: |-
            Interval between each snapshot.

            This property was added in __vSphere API 8.0.3.0__.
          format: int64
      description: |-
        The Snapservice.SnapshotSchedule schema contains properties that define the frequency at which snapshots must be taken.

        This schema was added in __vSphere API 8.0.3.0__.
    Snapservice.RetentionPeriod:
      required:
      - duration
      - unit
      type: object
      properties:
        unit:
          type: string
          description: |-
            Units for the retention period

            Possible values:
              - `MINUTE`: Minutes.
              - `HOUR`: Hours.
              - `DAY`: Day.
              - `WEEK`: Weeks.
              - `MONTH`: Months.
              - `YEAR`: Years.

            This constant was added in __vSphere API 9.1.0.0__.


            For more information see: *Snapservice.TimeUnit*.

            This property was added in __vSphere API 8.0.3.0__.
        duration:
          type: integer
          description: |-
            Duration for the snapshot to be retained

            This property was added in __vSphere API 8.0.3.0__.
          format: int64
      description: |-
        The Snapservice.RetentionPeriod schema contains properties that define the duration for which each snapshot must be retained.

        This schema was added in __vSphere API 8.0.3.0__.
    Snapservice.SnapshotPolicy:
      required:
      - name
      - retention
      - schedule
      type: object
      properties:
        name:
          type: string
          description: |-
            Name for the snapshot policy.

            This property was added in __vSphere API 8.0.3.0__.
        schedule:
          description: |-
            Schedule for the snapshots.

            This property was added in __vSphere API 8.0.3.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.SnapshotSchedule"
        retention:
          description: |-
            Retention period for the snapshots.

            This property was added in __vSphere API 8.0.3.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.RetentionPeriod"
      description: |-
        The Snapservice.SnapshotPolicy schema contains properties that describe the frequency and retention for taking snapshots of the protection targets.

        This schema was added in __vSphere API 8.0.3.0__.
    Snapservice.TimePeriod:
      required:
      - duration
      - unit
      type: object
      properties:
        unit:
          type: string
          description: |-
            Units for the duration in minutes, hours, days, weeks and years

            Possible values:
              - `MINUTE`: Minutes.
              - `HOUR`: Hours.
              - `DAY`: Day.
              - `WEEK`: Weeks.
              - `MONTH`: Months.
              - `YEAR`: Years.

            This constant was added in __vSphere API 9.1.0.0__.


            For more information see: *Snapservice.TimeUnit*.

            This property was added in __vSphere API 9.0.0.0__.
        duration:
          type: integer
          description: |-
            Duration of time in number

            This property was added in __vSphere API 9.0.0.0__.
          format: int64
      description: |-
        The Snapservice.TimePeriod schema contains properties that describes the time period and duration

        This schema was added in __vSphere API 9.0.0.0__.
    Snapservice.LongTermRetention:
      type: object
      properties:
        hourly:
          description: |-
            One snapshot for every hour is retained for the duration specified.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` hourly long term retention is not specified.
          allOf:
          - $ref: "#/components/schemas/Snapservice.HourlyRetention"
        daily:
          description: |-
            One snapshot for every day is retained for the duration specified.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` daily long term retention is not specified.
          allOf:
          - $ref: "#/components/schemas/Snapservice.DailyRetention"
        weekly:
          description: |-
            One snapshot for every week is retained for the duration specified.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` weekly long term retention is not specified.
          allOf:
          - $ref: "#/components/schemas/Snapservice.WeeklyRetention"
        monthly:
          description: |-
            One snapshot for every month is retained for the duration specified.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` monthly long term retention is not specified.
          allOf:
          - $ref: "#/components/schemas/Snapservice.MonthlyRetention"
      description: |-
        The Snapservice.LongTermRetention schema contains different types of long term snapshot retention settings for a given protection group with Snapservice.ReplicationPolicy enabled. At least one of the values must be specified.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.HourlyRetention:
      required:
      - retention
      type: object
      properties:
        retention:
          description: |-
            Total retention period for the snapshots.

            This property was added in __vSphere API 9.1.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TimePeriod"
      description: |-
        The Snapservice.HourlyRetention schema contains properties that describe the hourly retention settings for a given protection group with Snapservice.ReplicationPolicy enabled.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.DailyRetention:
      required:
      - hour
      - retention
      type: object
      properties:
        hour:
          type: integer
          description: |-
            Specifies the hour of the day, around which a replica snapshot is to be retained. The actual time when the snapshot is chosen might not be accurate since it depends on replica snapshots to be available as per the short term retention. Its value scope is [0, 1, 2, ..., 23]

            This property was added in __vSphere API 9.1.0.0__.
          format: int64
        retention:
          description: |-
            Total retention period for the snapshots.

            This property was added in __vSphere API 9.1.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TimePeriod"
      description: |-
        The Snapservice.DailyRetention schema contains properties that describe the daily retention settings for a given protection group with Snapservice.ReplicationPolicy enabled.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.WeeklyRetention:
      required:
      - day_of_week
      - hour
      - retention
      type: object
      properties:
        hour:
          type: integer
          description: |-
            Specifies the hour of the day, around which a replica snapshot is to be retained. The actual time when the snapshot is chosen might not be accurate since it depends on replica snapshots to be available as per the short term retention. Its value scope is [0, 1, 2, ..., 23]

            This property was added in __vSphere API 9.1.0.0__.
          format: int64
        day_of_week:
          type: string
          description: |-
            Specifies the day of week at which a replica snapshot is selected for long term retention.

            Possible values:
              - `SUNDAY`: Sunday
              - `MONDAY`: Monday
              - `TUESDAY`: Tuesday
              - `WEDNESDAY`: Wednesday
              - `THURSDAY`: Thursday
              - `FRIDAY`: Friday
              - `SATURDAY`: Saturday


            For more information see: *Snapservice.DayOfWeek*.

            This property was added in __vSphere API 9.1.0.0__.
        retention:
          description: |-
            Total retention period for the snapshots.

            This property was added in __vSphere API 9.1.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TimePeriod"
      description: |-
        The Snapservice.WeeklyRetention schema contains properties that describe the weekly retention settings for a given protection group with Snapservice.ReplicationPolicy enabled.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.MonthlyRetention:
      required:
      - day_of_month
      - hour
      - retention
      type: object
      properties:
        hour:
          type: integer
          description: |-
            Specifies the hour of the day, around which a replica snapshot is to be retained. The actual time when the snapshot is chosen might not be accurate since it depends on replica snapshots to be available as per the short term retention. Its value scope is [0, 1, 2, ..., 23]

            This property was added in __vSphere API 9.1.0.0__.
          format: int64
        day_of_month:
          type: integer
          description: |-
            Specifies the day of month at which a replica snapshot is selected for long term retention. Its value scope is [1, 2, ..., 30, 31]

            This property was added in __vSphere API 9.1.0.0__.
          format: int64
        retention:
          description: |-
            Total retention period for the snapshots.

            This property was added in __vSphere API 9.1.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TimePeriod"
      description: |-
        The Snapservice.MonthlyRetention schema contains properties that describe the monthly retention settings for a given protection group with Snapservice.ReplicationPolicy enabled.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.RetentionConfig:
      required:
      - frequency
      - retention
      type: object
      properties:
        frequency:
          type: string
          description: |-
            Frequency of snapshots to be retained. For e.g. DAILY : 1 snapshot per day

            Possible values:
              - `HOURLY`: Keep hourly snapshots.
              - `DAILY`: Keep daily snapshots.
              - `WEEKLY`: Keep weekly snapshots.
              - `MONTHLY`: Keep monthly snapshots.
              - `YEARLY`: Keep yearly snapshots.


            For more information see: *Snapservice.TimeFrequency*.

            This property was added in __vSphere API 9.0.0.0__.
        retention:
          description: |-
            Total retention period for the snapshots.

            This property was added in __vSphere API 9.0.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TimePeriod"
      description: |-
        The Snapservice.RetentionConfig schema contains properties that describe the retention settings for a given protection group with Snapservice.ReplicationPolicy enabled.

        This schema was added in __vSphere API 9.0.0.0__.
    Snapservice.ShortTermRetention:
      required:
      - keep_last
      type: object
      properties:
        keep_last:
          type: integer
          description: |-
            Retain the last n snapshots for the member entities created on the target replication site. The minimum and default value will be set to 1 to retain the last snapshot.

            This property was added in __vSphere API 9.0.0.0__.
          format: int64
      description: |-
        The Snapservice.ShortTermRetention schema contains properties that describe the short term retention settings for the snapshots created from member entities on the remote cluster specified by {#link clusterPair}

        This schema was added in __vSphere API 9.0.0.0__.
    Snapservice.RetentionPolicy:
      required:
      - short_term
      type: object
      properties:
        short_term:
          description: |-
            Short term snapshot retention settings for replication policy.

            This property was added in __vSphere API 9.0.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.ShortTermRetention"
        long_term:
          description: |-
            Holds long term snapshot retention settings for the replication policy.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` long term retention policies are not applicable.
          allOf:
          - $ref: "#/components/schemas/Snapservice.LongTermRetention"
      description: |-
        The Snapservice.RetentionPolicy schema contains properties that describe the policy for retention of the snapshots created for protection group members on the target replication site.

        This schema was added in __vSphere API 9.0.0.0__.
    Snapservice.ReplicationTargetConfiguration:
      type: object
      properties:
        use_replica_seed:
          type: boolean
          description: |-
            Specify if replica seed should be used for virtual machine replication.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` use the protection group level settings.
        storage_spec:
          description: |-
            Specify the target storage spec for virtual machine replication.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` protection group level config will be used.
          allOf:
          - $ref: "#/components/schemas/Snapservice.VmTargetStorageSpec"
      description: |-
        The Snapservice.ReplicationTargetConfiguration schema contains properties to configure the target for replication. At least one of the fields needs to be specified when updating the configuration.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VmReplicationConfigParams:
      type: object
      properties:
        target_config:
          description: |-
            Specify if replication target override should be configured for virtual machine replication.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` use the protection group level settings.
          allOf:
          - $ref: "#/components/schemas/Snapservice.ReplicationTargetConfiguration"
      description: |-
        The Snapservice.VmReplicationConfigParams schema contains properties to configure virtual machine replication. At least one of the fields needs to be specified when updating the replication configuration.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VmReplicationConfigSpec:
      required:
      - config_params
      - vm
      type: object
      properties:
        vm:
          type: string
          description: |-
            Identifier of the virtual machine.

            This property was added in __vSphere API 9.1.0.0__.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `VirtualMachine`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `VirtualMachine`.
        config_params:
          description: |-
            Virtual machine replication configuration parameters.

            This property was added in __vSphere API 9.1.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.VmReplicationConfigParams"
      description: |-
        The Snapservice.VmReplicationConfigSpec schema contains properties that describe the settings to configure virtual machine replication.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.TargetEntityReplicationSpec:
      type: object
      properties:
        vm_replication_specs:
          type: array
          description: |-
            Optional list of virtual machine specific replication configuration. Only unique vms can be specified in the list of replication configurations. This is mandatory for the current release, but we are keeping it optional for future use-cases.

            This property was added in __vSphere API 9.1.0.0__.

            if missing or `null` no virtual machine specific replication configuration overrides.
          items:
            $ref: "#/components/schemas/Snapservice.VmReplicationConfigSpec"
      description: |-
        The Snapservice.TargetEntityReplicationSpec schema contains properties that describe the settings to configure target entity replication. Currently, we only support virtual machines as a target entity.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.TargetStorageSpec:
      type: object
      properties:
        target_datastore:
          type: string
          description: |-
            Target datastore.

            This property was added in __vSphere API 9.1.0.0__.

            This property is being kept optional for future use-cases, but mandatory in the current version.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `Datastore`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `Datastore`.
      description: |-
        The Snapservice.TargetStorageSpec schema contains properties that describe the settings to configure target storage for the replication.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VmTargetStorageSpec:
      type: object
      properties:
        target_datastore:
          type: string
          description: |-
            Target datastore.

            This property was added in __vSphere API 9.1.0.0__.

            This property is being kept optional for future use-cases, but mandatory in the current version.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `Datastore`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `Datastore`.
      description: |-
        The Snapservice.VmTargetStorageSpec schema contains properties that describe the settings to configure virtual machine level target storage for the replication.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.ReplicationPolicy:
      required:
      - recovery_point_objective
      - snapshot_retention
      type: object
      properties:
        cluster_pair:
          type: string
          description: |-
            Identifier of the cluster pair. The member entity of the protection group will be replicated to the peer cluster part of the cluster pair.

            This property was added in __vSphere API 9.0.0.0__.

            This property is being kept optional for future use-cases, but mandatory in the current version.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `com.vmware.snapservice.cluster_pair`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `com.vmware.snapservice.cluster_pair`.
        recovery_point_objective:
          description: |-
            The RecoveryPointObjective(RPO) is a measure to configure amount of data that is acceptable to lose in an event of a disaster or failure.

            This property was added in __vSphere API 9.0.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TimePeriod"
        snapshot_retention:
          description: |-
            Snapshot retention policy for remote site.

            This property was added in __vSphere API 9.0.0.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.RetentionPolicy"
        use_replica_seed:
          type: boolean
          description: "Specify if replica seed on destination should be used for\
            \ initial sync. This flag applies to all protection group member entities,\
            \ unless overridden for the individual target entity. \n\n During edit\
            \ workflow, if the value of the flag is changed, the updated value would\
            \ apply only to - existing member entities where no override is set and\
            \ replication has not yet been configured, either due to a failure or\
            \ any other delay. - new incoming member entities where no override is\
            \ set.\n\nThis property was added in __vSphere API 9.1.0.0__.\n\nThis\
            \ property is optional because it was added in a newer version than its\
            \ parent node."
        storage_spec:
          description: "Target storage spec for all the VMs configured with this protection\
            \ group. This spec applies to all protection group member entities, unless\
            \ overridden for the individual target entity. \n\n During an edit workflow,\
            \ if the spec is changed, the updated value would apply only to existing\
            \ member entities where no override is set and replication has not yet\
            \ been configured, either due to a failure or any other delay. In new\
            \ incoming member entities where no override is set.\n\nThis property\
            \ was added in __vSphere API 9.1.0.0__.\n\nif missing or `null` snap service\
            \ will try to determine target datastore."
          allOf:
          - $ref: "#/components/schemas/Snapservice.TargetStorageSpec"
        target_entity_replication_spec:
          description: "Optional target entity policies to override protection group\
            \ level replication policy settings. \n\n Target entity overrides can\
            \ only be applied to incoming member entities, eg. new vms added to a\
            \ protection group during edit protection group operation. In order to\
            \ update the replication settings for an existing member entity, the target\
            \ entity specific update API should be used. \n\n The member entity overrides\
            \ are not displayed as a part of protection group List/Get operations.\n\
            \nThis property was added in __vSphere API 9.1.0.0__.\n\nif missing or\
            \ `null` the member entities will use the protection group level setting."
          allOf:
          - $ref: "#/components/schemas/Snapservice.TargetEntityReplicationSpec"
      description: |-
        The Snapservice.ReplicationPolicy schema contains properties that describe the settings to configure replication for a given protection group.

        This schema was added in __vSphere API 9.0.0.0__.
    Snapservice.ProtectionGroupSpec:
      required:
      - name
      - target_entities
      type: object
      properties:
        name:
          type: string
          description: |-
            Name of the protection group.

            This property was added in __vSphere API 8.0.3.0__.
        target_entities:
          description: |-
            Target entities for the protection.

            This property was added in __vSphere API 8.0.3.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TargetEntities"
        snapshot_policies:
          type: array
          description: |-
            Snapshot policy for the protection targets.

            This property was added in __vSphere API 8.0.3.0__.

            if missing or `null` local protection will be skipped.
          items:
            $ref: "#/components/schemas/Snapservice.SnapshotPolicy"
        locked:
          type: boolean
          description: |-
            Indicates if the protection group is to be locked. A locked protection group cannot be modified or deleted by the user. All snapshots associated with the protection group will be secure and cannot be deleted. The system will automatically delete these snapshots upon expiry based on the retention period.

            This property was added in __vSphere API 8.0.3.0__.

            if missing or `null` the protection group will be considered as unlocked.
        replication_policies:
          type: array
          description: |-
            Replication policy for the protection group. Currently, only one ReplicationPolicy will be allowed. Additional policies to support protecting virtual machines to multiple clusters may be supported in the future

            This property was added in __vSphere API 9.0.0.0__.

            Set if replication needs to be configured. Currently only one policy is supported
          items:
            $ref: "#/components/schemas/Snapservice.ReplicationPolicy"
      description: |-
        The Snapservice.ProtectionGroupSpec schema contains properties that describe the desired protection group and the snapshot policies associated with it. A protection group is a group of entities that vSAN Snapshot Service protects together.

        This schema was added in __vSphere API 8.0.3.0__.
    Snapservice.ProtectionGroupUpdateSpec:
      type: object
      properties:
        name:
          type: string
          description: |-
            Name of the protection group.

            This property was added in __vSphere API 8.0.3.0__.

            if missing or `null`, the current proteciton group name will be retained.
        target_entities:
          description: |-
            Target entities for the protection. If set, this will represent all the target entities for the protection group.

            This property was added in __vSphere API 8.0.3.0__.

            if missing or `null`, the existing target entities will be retained.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TargetEntities"
        snapshot_policies:
          type: array
          description: |-
            Snapshot policy for the protection targets. If set, this will represent all the snapshot policies for the protection group. Any existing policies will be removed, if not specified in the new list.

            This property was added in __vSphere API 8.0.3.0__.

            if missing or `null`, existing snapshot policies will be retained.
          items:
            $ref: "#/components/schemas/Snapservice.SnapshotPolicy"
        replication_policies:
          type: array
          description: |-
            Replication policies for the protection group.

            This property was added in __vSphere API 9.0.0.0__.

            Set if replication needs to be configured. Currently only one policy is supported
          items:
            $ref: "#/components/schemas/Snapservice.ReplicationPolicy"
        locked:
          type: boolean
          description: "Indicates if the protection group is to be locked. A locked\
            \ protection group cannot be modified or deleted by the user. All snapshots\
            \ associated with the protection group will be secure and cannot be deleted.\
            \ The system will automatically delete these snapshots upon expiry based\
            \ on the retention period. \n\n Setting this field to false for an immutable\
            \ protection group will not be supported.\n\nThis property was added in\
            \ __vSphere API 9.1.0.0__.\n\nif missing or `null`, existing configuration\
            \ will be retained."
      description: |-
        The Snapservice.ProtectionGroupUpdateSpec schema contains properties that describe the desired protection group and the snapshot policies associated with it. A protection group is a group of entities that vSAN Snapshot Service protects together.

        This schema was added in __vSphere API 8.0.3.0__.
    Snapservice.ProtectionGroupInfo:
      required:
      - locked
      - name
      - snapshot_policies
      - snapshots
      - status
      - target_entities
      - vms
      type: object
      properties:
        name:
          type: string
          description: |-
            Name of the protection group.

            This property was added in __vSphere API 8.0.3.0__.
        status:
          type: string
          description: "Current status of the protection group.\n\nPossible values:\n\
            \  - `ACTIVE`: Active\n  - `PAUSED`: Paused\n  - `MARKED_FOR_DELETE`:\
            \ Marked for delete, \n\n Indicates that the PG is soft deleted but has\
            \ some PG snapshots and VM snapshots which are not yet expired. \n  -\
            \ `DEMOTED`: Indicates that the protection group is in a demoted state.\
            \ While in this state, there are no outgoing or incoming replications\
            \ and local snapshots (if any) are also stopped.\n  - `DORMANT`: \n\n\
            \ Indicates that the PG is in dormant state.  \n\n In this state, all\
            \ local protection and outgoing replications for the members are disabled.\
            \ Members belonging to this protection group will be replica members for\
            \ active incoming replications. \n\nThis constant was added in __vSphere\
            \ API 9.0.0.0__.\n  - `RECOVERY`: Recovery state. \n\n Indicates the protection\
            \ group is in a recovery state. In this state site recovery operations\
            \ can be initiated in case of planned migration and unplanned failover.\
            \ \n\nThis constant was added in __vSphere API 9.0.0.0__.\n  - `DORMANT_RANSOMWARE_RECOVERY`:\
            \ Dormant ransomware recovery state. \n\n Indicates the dormant protection\
            \ group is undergoing ransomware recovery. In this state protection group\
            \ state can be transitioned to DORMANT or DORMANT_PARTIAL_RECOVERY when\
            \ end ransomware recovery operation is initiated. \n\nThis constant was\
            \ added in __vSphere API 9.1.0.0__.\n  - `DORMANT_PARTIAL_RECOVERY`: Dormant\
            \ partial recovery state. \n\n Indicates some of the virtual machines\
            \ from dormant protection group have been recovered on the recovery site.\
            \ In this state protection group state can be transitioned to DORMANT_RANSOMWARE_RECOVERY\
            \ when start ransomware recovery operation is initiated. \n\nThis constant\
            \ was added in __vSphere API 9.1.0.0__.\n  - `ACTIVE_RANSOMWARE_RECOVERY`:\
            \ Active ransomware recovery state. \n\n Indicates that a ransomware recovery\
            \ operation is being performed on the recovery site for one or more virtual\
            \ machines in the active protection group. In this state protection group\
            \ state can be transitioned to ACTIVE or ACTIVE_PARTIAL_RECOVERY when\
            \ end ransomware recovery operation is initiated. \n\nThis constant was\
            \ added in __vSphere API 9.1.0.0__.\n  - `ACTIVE_PARTIAL_RECOVERY`: Active\
            \ partial recovery state. \n\n Indicates some of the virtual machines\
            \ from active protection group have been recovered on the recovery site.\
            \ In this state protection group state can be transitioned to ACTIVE_RANSOMWARE_RECOVERY\
            \ when start ransomware recovery operation is initiated. \n\nThis constant\
            \ was added in __vSphere API 9.1.0.0__.\n  - `PAUSED_RANSOMWARE_RECOVERY`:\
            \ Paused ransomware recovery state. \n\n Indicates that a ransomware recovery\
            \ operation is being performed on the recovery site for one or more virtual\
            \ machines in the paused protection group In this state protection group\
            \ state can be transitioned to PAUSED or PAUSED_PARTIAL_RECOVERY when\
            \ end ransomware recovery operation is initiated. \n\nThis constant was\
            \ added in __vSphere API 9.1.0.0__.\n  - `PAUSED_PARTIAL_RECOVERY`: Paused\
            \ partial recovery state. \n\n Indicates some of the virtual machines\
            \ from paused protection group have been recovered on the recovery site.\
            \ In this state protection group state can be transitioned to PAUSED_RANSOMWARE_RECOVERY\
            \ when start ransomware recovery operation is initiated. \n\nThis constant\
            \ was added in __vSphere API 9.1.0.0__.\n\n\nFor more information see:\
            \ *Snapservice.ProtectionGroupStatus*.\n\nThis property was added in __vSphere\
            \ API 8.0.3.0__."
        target_entities:
          description: |-
            User provided target entities that must belong to the protection group.

            This property was added in __vSphere API 8.0.3.0__.
          allOf:
          - $ref: "#/components/schemas/Snapservice.TargetEntities"
        snapshot_policies:
          type: array
          description: |-
            Snapshot policies for the protection targets.

            This property was added in __vSphere API 8.0.3.0__.
          items:
            $ref: "#/components/schemas/Snapservice.SnapshotPolicy"
        last_snapshot_time:
          type: string
          description: |-
            Time at which the last protection group snapshot was taken.

            This property was added in __vSphere API 8.0.3.0__.

            is missing or `null` if there are no snapshots taken for the protection group.
          format: date-time
        oldest_snapshot_time:
          type: string
          description: |-
            Time at which the current oldest protection group snapshot was taken.

            This property was added in __vSphere API 8.0.3.0__.

            is missing or `null` if there are no snapshots taken for the protection group.
          format: date-time
        vms:
          uniqueItems: true
          type: array
          description: |-
            List of virtual machines that belong to the protection group. This is a combined list of virtual machines from the dynamic vm name and the individual list of virtual machines specified during creation of the protection group.

            This property was added in __vSphere API 8.0.3.0__.

            When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `VirtualMachine`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `VirtualMachine`.
          items:
            type: string
        snapshots:
          uniqueItems: true
          type: array
          description: |-
            List of snapshots taken for the protection group.

            This property was added in __vSphere API 8.0.3.0__.

            When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `com.vmware.snapservice.protection_group.snapshot`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `com.vmware.snapservice.protection_group.snapshot`.
          items:
            type: string
        locked:
          type: boolean
          description: |-
            Indicates if the protection group is to be locked. A locked protection group cannot be modified or deleted by the user. All snapshots associated with the protection group will be secure and cannot be deleted. The system will automatically delete these snapshots upon expiry based on the retention period

            This property was added in __vSphere API 8.0.3.0__.
        guid:
          type: string
          description: |-
            The Global identifier of the protection group, which can be used to associate protection groups created on remote sites as part of replication configurations

            This property was added in __vSphere API 9.0.0.0__.

            This property is optional because it was added in a newer version than its parent node.
        replication_policies:
          type: array
          description: |-
            Replication configuration for the protection group specified by the user.

            This property was added in __vSphere API 9.0.0.0__.

            This property is optional because it was added in a newer version than its parent node.
          items:
            $ref: "#/components/schemas/Snapservice.ReplicationPolicy"
      description: |-
        The Snapservice.ProtectionGroupInfo schema contains properties that provide detailed information regarding the protection group and the snapshot policies associated with it.

        This schema was added in __vSphere API 8.0.3.0__.
    Snapservice.TagRule:
      required:
      - operator
      - tags
      type: object
      properties:
        tags:
          type: array
          description: |-
            List of tag identifiers.

            This property was added in __vSphere API 9.1.0.0__.

            When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `Tag`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `Tag`.
          items:
            type: string
        operator:
          type: string
          description: |-
            Logical operator for the tags. This specifies how to join the tags within the tag IDs list above.

            Possible values:
              - `AND`: All rule sets should satisfy the criteria.
              - `OR`: Any rule set can satisfy the criteria.


            For more information see: *Snapservice.LogicalOperator*.

            This property was added in __vSphere API 9.1.0.0__.
      description: |-
        The Snapservice.TagRule schema contains properties that provide the list of tags and joining strategy for the tags.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.VmMembershipInfo:
      required:
      - membership_change_reasons
      - membership_change_type
      - protection_groups
      - vm
      - vm_name
      type: object
      properties:
        vm:
          type: string
          description: |-
            Identifier of the virtual machine.

            This property was added in __vSphere API 9.1.0.0__.

            When clients pass a value of this schema as a parameter, the property must be an identifier for the resource type: `VirtualMachine`. When operations return a value of this schema as a response, the property will be an identifier for the resource type: `VirtualMachine`.
        vm_name:
          type: string
          description: |-
            Name of the virtual machine.

            This property was added in __vSphere API 9.1.0.0__.
        protection_groups:
          uniqueItems: true
          type: array
          description: |-
            Identifiers of the protection groups that the virtual machine belongs to.

            This property was added in __vSphere API 9.1.0.0__.

            When clients pass a value of this schema as a parameter, the property must contain identifiers for the resource type: `com.vmware.snapservice.protection_group`. When operations return a value of this schema as a response, the property will contain identifiers for the resource type: `com.vmware.snapservice.protection_group`.
          items:
            type: string
        membership_change_type:
          type: string
          description: |-
            The change type represents the change of relationship between the virtual machine and protection group.

            Possible values:
              - `ADD`: The virtual machine is added to protection group.
              - `REMOVE`: The virtual machine is removed from protection group.
              - `EXCLUDE`: The virtual machine is excluded from protection group by filter conditions.
              - `EXISTING`: The virtual machine already exists in protection group, and keeps existing.


            For more information see: *Snapservice.MembershipChangeType*.

            This property was added in __vSphere API 9.1.0.0__.
        membership_change_reasons:
          type: array
          description: |-
            The reasons for membershipChangeType. There may be several reasons in one change.

            This property was added in __vSphere API 9.1.0.0__.
          items:
            $ref: "#/components/schemas/Vapi.Std.LocalizableMessage"
      description: |-
        The Snapservice.VmMembershipInfo schema contains information about a virtual machine.

        This schema was added in __vSphere API 9.1.0.0__.
    Snapservice.MemberEntities:
      required:
      - excluded_vms
      - included_vms
      type: object
      properties:
        included_vms:
          type: array
          description: |-
            The virtual machines with membershipChangeType ADD or EXISTING. The list is empty if the protection group will have no virtual machines based on the provided ComputeMembersSpec.

            This property was added in __vSphere API 9.1.0.0__.
          items:
            $ref: "#/components/schemas/Snapservice.VmMembershipInfo"
        excluded_vms:
          type: array
          description: |-
            The virtual machines with membershipChangeType REMOVE or EXCLUDE. The list is empty if there is no virtual machines to be ineligible or removed from protection group based on the provided ComputeMembersSpec.

            This property was added in __vSphere API 9.1.0.0__.
          items:
            $ref: "#/components/schemas/Snapservice.VmMembershipInfo"
      description: |-
